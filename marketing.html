<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Marketing Place</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen font-sans">
    <div class="flex-1 p-10 overflow-y-auto">
        <h2 class="text-3xl font-black italic uppercase mb-8">Marketing Showcase</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white rounded-[40px] overflow-hidden shadow-sm border border-slate-200">
                <img src="https://images.unsplash.com/photo-1557804506-669a67965ba0?w=600" class="w-full h-48 object-cover">
                <div class="p-8">
                    <span class="bg-blue-100 text-blue-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">Featured Service</span>
                    <h3 class="text-xl font-black mt-4">Professional CV Design</h3>
                    <p class="text-slate-500 text-sm mt-2">Get noticed by top Tanzanian firms. Our AI designs your CV in seconds.</p>
                    <button class="mt-6 font-black text-blue-600 underline">Learn More</button>
                </div>
            </div>

            <div class="bg-white rounded-[40px] overflow-hidden shadow-sm border border-slate-200">
                <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=600" class="w-full h-48 object-cover">
                <div class="p-8">
                    <span class="bg-green-100 text-green-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">Academic Promo</span>
                    <h3 class="text-xl font-black mt-4">Exam Prep Mastery</h3>
                    <p class="text-slate-500 text-sm mt-2">Access premium past papers for BACC and HRM departments.</p>
                    <button class="mt-6 font-black text-green-600 underline">View Papers</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
