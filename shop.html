<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .p-card { background: white; border-radius: 24px; overflow: hidden; border: 1px solid #f1f5f9; transition: 0.3s; }
        .p-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen font-sans">
    <div class="flex-1 p-10 overflow-y-auto">
        <header class="mb-10 flex justify-between items-center bg-white p-6 rounded-3xl border">
            <div>
                <h2 class="text-3xl font-black italic uppercase">Stationery Mart</h2>
                <p id="wal-display" class="text-green-500 font-black">0 Tsh</p>
            </div>
            <button onclick="checkCart()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase">CART (<span id="cart-count">0</span>)</button>
        </header>
        
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </div>
    <script>
        const products = [
            { name: "Executive Ballpoint (Blue)", price: 200, img: "https://images.unsplash.com/photo-1585336261022-69c66d160f8c?w=400" },
            { name: "Casio Scientific Calc", price: 35000, img: "https://images.unsplash.com/photo-1594814171821-2e58c1f60fbb?w=400" },
            { name: "A4 Accountable Book", price: 4500, img: "https://images.unsplash.com/photo-1544816155-12df9643f363?w=400" },
            { name: "HP Pencil (Box of 12)", price: 1500, img: "https://images.unsplash.com/photo-1510811617201-4903332822d1?w=400" },
            { name: "Highlighter Set", price: 6000, img: "https://images.unsplash.com/photo-1516962215378-7fa2e137ae93?w=400" },
            { name: "Stapler + Bullets", price: 7500, img: "https://images.unsplash.com/photo-1590247813693-5541d1c609fd?w=400" },
            { name: "Executive Clipboard", price: 5500, img: "https://images.unsplash.com/photo-1623693380951-9cc71374f762?w=400" },
            { name: "Ruler (TIA Style)", price: 500, img: "https://images.unsplash.com/photo-1583166885834-080c35456722?w=400" }
        ];

        // Loop to generate 50+ items
        const grid = document.getElementById('grid');
        for (let i = 0; i < 60; i++) {
            const p = products[i % products.length];
            grid.innerHTML += `
                <div class="p-card">
                    <img src="${p.img}" class="w-full h-40 object-cover">
                    <div class="p-6">
                        <h4 class="font-black text-xs uppercase mb-1">${p.name}</h4>
                        <p class="text-xl font-black text-blue-600 mb-4">${p.price.toLocaleString()} Tsh</p>
                        <button onclick="buy('${p.name}', ${p.price})" class="w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase">Add to Cart</button>
                    </div>
                </div>`;
        }

        let cart = [];
        let balance = parseInt(localStorage.getItem('userBalance')) || 0;
        document.getElementById('wal-display').innerText = balance.toLocaleString() + " Tsh";

        function buy(n, p) {
            cart.push({n, p});
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkCart() {
            let total = cart.reduce((s, i) => s + i.p, 0);
            if(confirm(`Order Summary:\nTotal: ${total.toLocaleString()} Tsh\nPay from Wallet?`)) {
                if(balance >= total && cart.length > 0) {
                    balance -= total;
                    localStorage.setItem('userBalance', balance);
                    alert("Payment Successful! Order placed.");
                    cart = [];
                    location.reload();
                } else { alert("Insufficient Funds or Cart Empty!"); }
            }
        }
    </script>
</body>
</html>
