<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 13px; }
        .active-nav { background: #3b82f6; color: white; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans">

    <div class="w-72 bg-slate-900 text-white p-8 flex flex-col shrink-0">
        <h1 class="text-2xl font-black text-blue-500 italic mb-12 uppercase tracking-tighter">HILSEY BIZ</h1>
        <nav class="space-y-2 flex-1">
            <a href="dashboard.html" class="nav-item"><span>📊</span> Dashboard</a>
            <a href="shop.html" class="nav-item active-nav"><span>🛍️</span> Marketplace</a>
            <a href="workspace.html" class="nav-item"><span>✍️</span> Working Space</a>
            <a href="gateway.html" class="nav-item text-red-400 mt-20"><span>🚪</span> Logout</a>
        </nav>
    </div>

    <div class="flex-1 flex flex-col p-10 overflow-y-auto">
        <header class="mb-10 flex justify-between items-center">
            <h2 class="text-3xl font-black italic uppercase">Stationery Mart</h2>
            <div class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-lg">Wallet: <span id="wal-bal">0</span> Tsh</div>
        </header>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </div>

    <script>
        const products = [
            { name: "Executive Ballpoint Pen", price: 500, img: "https://images.unsplash.com/photo-1511556820780-d912e42b4980?auto=format&fit=crop&q=80&w=400" },
            { name: "A4 Accountable Book", price: 4500, img: "https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&q=80&w=400" },
            { name: "Casio Scientific Calculator", price: 35000, img: "https://images.unsplash.com/photo-1594814171821-2e58c1f60fbb?auto=format&fit=crop&q=80&w=400" },
            { name: "HP Pencil Pack (12pcs)", price: 2500, img: "https://images.unsplash.com/photo-1510811617201-4903332822d1?auto=format&fit=crop&q=80&w=400" }
        ];

        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="bg-white rounded-[40px] overflow-hidden border border-slate-200 shadow-sm hover:shadow-xl transition">
                    <img src="${p.img}" class="w-full h-48 object-cover">
                    <div class="p-8">
                        <h4 class="font-black text-xs uppercase mb-2">${p.name}</h4>
                        <p class="text-xl font-black text-blue-600 mb-6">${p.price.toLocaleString()} Tsh</p>
                        <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 transition">Add to Cart</button>
                    </div>
                </div>`;
        });

        document.getElementById('wal-bal').innerText = (localStorage.getItem('userBalance') || 0).toLocaleString();
    </script>
</body>
</html>
