<script>
    let cartItems = [];
    let total = 0;

    // 1. PULL THE REAL BALANCE FROM THE WALLET
    let currentBalance = parseInt(localStorage.getItem('userBalance')) || 0;

    function addToCart(name, price) {
        cartItems.push({name, price});
        total += price;
        updateUI();
    }

    function updateUI() {
        document.getElementById('cart-total').innerText = total.toLocaleString() + " Tsh";
        document.getElementById('modal-total').innerText = total.toLocaleString();
        
        const list = document.getElementById('cart-items-list');
        list.innerHTML = "";
        cartItems.forEach((item, index) => {
            list.innerHTML += `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                    <div>
                        <p class="font-bold text-slate-800 text-sm">${item.name}</p>
                        <p class="text-[10px] text-blue-600 font-bold">${item.price.toLocaleString()} Tsh</p>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-400 text-lg hover:text-red-600">✕</button>
                </div>`;
        });
    }

    // 2. THE BUSINESS CHECKOUT LOGIC
    function processCheckout() {
        if (total === 0) {
            alert("Your cart is empty!");
            return;
        }

        if (currentBalance >= total) {
            // SUCCESS: Subtract money
            currentBalance -= total;
            localStorage.setItem('userBalance', currentBalance); // Save new balance
            
            alert("ORDER SUCCESSFUL!\n" + total.toLocaleString() + " Tsh has been deducted from your wallet.\nYour stationery is being prepared.");
            
            // Reset Cart
            cartItems = [];
            total = 0;
            updateUI();
            toggleCart();
            
            // Redirect to profile to see the new balance
            window.location.href = "profile.html";
        } else {
            // FAILURE: Not enough money
            alert("INSUFFICIENT BALANCE!\n\nYour Total: " + total.toLocaleString() + " Tsh\nYour Wallet: " + currentBalance.toLocaleString() + " Tsh\n\nPlease go to 'My Wallet' to top up.");
            window.location.href = "profile.html";
        }
    }

    function toggleCart() {
        const modal = document.getElementById('cart-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }
</script>
