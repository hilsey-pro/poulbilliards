<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Stationery Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 12px; color: #94a3b8; font-size: 13px; font-weight: 700; transition: 0.2s; }
        .nav-item:hover { background: #1e293b; color: white; }
        .nav-active { background: #3b82f6; color: white; }
        .p-card { background: white; border: 1px solid #f1f5f9; border-radius: 20px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .p-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: #3b82f6; }
        .p-img { width: 100%; h-40; object-fit: cover; background: #f8fafc; min-height: 160px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans">

    <div class="w-72 bg-slate-900 text-white p-6 flex flex-col shrink-0 overflow-y-auto">
        <h1 class="text-2xl font-black text-blue-500 italic mb-8 tracking-tighter text-center uppercase">Hilsey Biz</h1>
        
        <nav class="space-y-1">
            <p class="text-[10px] text-slate-500 font-black uppercase px-4 mb-2 tracking-widest">Main Dashboard</p>
            <a href="dashboard.html" class="nav-item"><span>📊</span> Overview</a>
            <a href="shop.html" class="nav-item nav-active"><span>🛍️</span> Marketplace</a>
            <a href="profile.html" class="nav-item"><span>💳</span> My Wallet</a>

            <p class="text-[10px] text-slate-500 font-black uppercase px-4 mt-6 mb-2 tracking-widest">Education Panel</p>
            <a href="lecture.html" class="nav-item"><span>📺</span> Lecture Panel</a>
            <a href="classes.html" class="nav-item"><span>🏫</span> Class Manager</a>
            <a href="papers.html" class="nav-item"><span>📝</span> Past Papers</a>
            <a href="workspace.html" class="nav-item"><span>✍️</span> Assignments Hub</a>

            <p class="text-[10px] text-slate-500 font-black uppercase px-4 mt-6 mb-2 tracking-widest">Innovation & Social</p>
            <a href="ai-assistant.html" class="nav-item"><span>🤖</span> Hilsey AI Pro</a>
            <a href="marketing.html" class="nav-item"><span>📢</span> Marketing Place</a>
            <a href="discussion.html" class="nav-item"><span>💬</span> Discussion Hub</a>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-800 text-center">
            <p class="text-[10px] text-slate-500 font-bold uppercase">Balance</p>
            <p id="nav-balance" class="text-lg font-black text-green-400">0 Tsh</p>
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <header class="p-8 bg-white border-b flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter text-slate-900">Stationery Mart</h2>
                <p class="text-xs text-slate-400 font-bold">Official Business Supplies for TIA Students</p>
            </div>
            <div class="flex gap-4">
                <button onclick="openCart()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-sm shadow-lg shadow-blue-500/20 uppercase tracking-widest">
                    Cart Items: <span id="cart-count">0</span>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-10">
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                </div>
        </main>
    </div>

    <script>
        // List of real stationery items with actual images
        const items = [
            { name: "Blue Ballpoint Pen", price: 200, img: "https://images.unsplash.com/photo-1585336261022-69c66d160f8c?w=400" },
            { name: "A4 Counter Book (2-Quire)", price: 3500, img: "https://images.unsplash.com/photo-1531346878377-a5be20888e57?w=400" },
            { name: "Scientific Calculator", price: 25000, img: "https://images.unsplash.com/photo-1574607383476-f517f220d398?w=400" },
            { name: "Executive Leather Folder", price: 15000, img: "https://images.unsplash.com/photo-1623693380951-9cc71374f762?w=400" },
            { name: "HB Pencils (Box of 12)", price: 2000, img: "https://images.unsplash.com/photo-1510811617201-4903332822d1?w=400" },
            { name: "Plastic Ruler 30cm", price: 500, img: "https://images.unsplash.com/photo-1583166885834-080c35456722?w=400" },
            { name: "Highlighter Set", price: 4500, img: "https://images.unsplash.com/photo-1516962215378-7fa2e137ae93?w=400" },
            { name: "Stapler + Bullets", price: 6000, img: "https://images.unsplash.com/photo-1590247813693-5541d1c609fd?w=400" }
        ];

        // Generate the 50+ items loop
        const grid = document.getElementById('product-grid');
        
        // Let's repeat our main items to fill the page (to show 50+ items)
        for (let i = 0; i < 50; i++) {
            const product = items[i % items.length];
            grid.innerHTML += `
                <div class="p-card">
                    <img src="${product.img}&sig=${i}" class="p-img" alt="${product.name}">
                    <div class="p-6 flex flex-col flex-1">
                        <h4 class="font-black text-xs uppercase text-slate-800 mb-1">${product.name}</h4>
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-4 tracking-tighter">In Stock - Hilsey Warehouse</p>
                        <div class="mt-auto flex justify-between items-center">
                            <span class="text-lg font-black text-blue-600">${product.price.toLocaleString()} <span class="text-[10px]">Tsh</span></span>
                            <button onclick="addToCart('${product.name}', ${product.price})" class="bg-slate-900 text-white p-3 rounded-xl hover:bg-blue-600 transition">
                                🛒
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        let cart = [];
        let balance = parseInt(localStorage.getItem('userBalance')) || 0;
        document.getElementById('nav-balance').innerText = balance.toLocaleString() + " Tsh";

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
        }

        function openCart() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            if(cart.length === 0) {
                alert("Cart is empty!");
                return;
            }
            if(confirm(`Order Summary:\nItems: ${cart.length}\nTotal: ${total.toLocaleString()} Tsh\n\nPay from Hilsey Wallet?`)) {
                if(balance >= total) {
                    balance -= total;
                    localStorage.setItem('userBalance', balance);
                    alert("Order Confirmed! Your stationery is ready for pickup.");
                    cart = [];
                    location.reload();
                } else {
                    alert("Insufficient Funds! You have " + balance.toLocaleString() + " Tsh. Please top up.");
                    window.location.href = "profile.html";
                }
            }
        }
    </script>
</body>
</html>
