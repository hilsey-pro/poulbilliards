<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Permanent Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --word-blue: #2b579a; --ribbon-grey: #f3f4f6; --hilsey-dark: #0b132b; }
        
        body { background: #0f172a; color: #333; display: flex; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* PERMANENT LEFT RAIL - Visible on PC and Phone */
        .left-rail { 
            width: 70px; 
            background: var(--hilsey-dark); 
            flex-shrink: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px 0;
            border-right: 1px solid rgba(255,255,255,0.1);
            z-index: 5000;
        }
        
        .rail-btn { 
            width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center; 
            color: #94a3b8; font-size: 20px; border-radius: 12px; 
            margin-bottom: 15px; transition: 0.2s; cursor: pointer;
            text-decoration: none;
        }
        .rail-btn:hover, .rail-btn.active { background: #3a86ff; color: white; }
        .rail-label { font-size: 8px; color: white; text-align: center; margin-top: -12px; margin-bottom: 15px; opacity: 0.7; }

        /* Main Content Area */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* WORD RIBBON (Scrolls sideways on phone) */
        .ribbon-container { width: 100%; background: var(--ribbon-grey); border-bottom: 1px solid #ccc; overflow-x: auto; flex-shrink: 0; }
        .ribbon-tabs { background: var(--word-blue); display: flex; min-width: max-content; }
        .tab { padding: 8px 15px; color: white; font-size: 11px; cursor: pointer; }
        .tab.active { background: var(--ribbon-grey); color: var(--word-blue); font-weight: bold; }

        .ribbon-content { display: none; padding: 10px; gap: 15px; align-items: center; height: 85px; background: var(--ribbon-grey); min-width: max-content; }
        .ribbon-content.active { display: flex; }

        /* THE PAPER */
        #viewport { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 15px; background: #cbd5e1; }
        #paper { 
            background: white; width: 100%; max-width: 800px; min-height: 1000px; 
            padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); outline: none; border-radius: 2px;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .left-rail { width: 60px; }
            .rail-btn { width: 40px; height: 40px; font-size: 18px; }
            #paper { padding: 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="left-rail">
        <div class="font-black italic text-blue-500 mb-6">H</div>
        
        <a href="/dashboard" class="rail-btn" title="Dashboard">📊</a>
        <div class="rail-label">DASH</div>

        <a href="/" class="rail-btn active" title="Editor">✍️</a>
        <div class="rail-label">EDIT</div>

        <a href="/templates" class="rail-btn" title="Templates">🎓</a>
        <div class="rail-label">TEMP</div>

        <a href="/hub" class="rail-btn" title="Discussion Hub">💬</a>
        <div class="rail-label">HUB</div>

        <a href="/cloud" class="rail-btn" title="Cloud Storage">☁️</a>
        <div class="rail-label">CLOUD</div>

        <div class="mt-auto"></div> <button onclick="savePDF()" class="rail-btn bg-red-600 text-white" title="Download PDF">PDF</button>
        <button onclick="shareWA()" class="rail-btn bg-green-500 text-white" title="Share WhatsApp">WA</button>
    </div>

    <div class="main-wrapper">
        <div class="ribbon-container">
            <div class="ribbon-tabs">
                <div class="tab active" onclick="switchTab(event, 'home')">Home</div>
                <div class="tab" onclick="switchTab(event, 'insert')">Insert</div>
                <div class="tab" onclick="switchTab(event, 'layout')">Layout</div>
            </div>
            
            <div id="home" class="ribbon-content active">
                <div class="flex flex-col border-r pr-4">
                    <div class="flex gap-1 mb-1">
                        <button onclick="cmd('bold')" class="border p-1 bg-white font-bold w-8">B</button>
                        <button onclick="cmd('italic')" class="border p-1 bg-white italic w-8">I</button>
                        <button onclick="cmd('underline')" class="border p-1 bg-white underline w-8">U</button>
                    </div>
                    <select onchange="cmd('fontName', this.value)" class="text-[10px] border"><option>Arial</option><option>Georgia</option></select>
                </div>
                <div class="flex flex-col border-r pr-4">
                    <button onclick="cmd('justifyCenter')" class="border p-1 bg-white mb-1">Center</button>
                    <button onclick="cmd('insertUnorderedList')" class="border p-1 bg-white text-[10px]">List</button>
                </div>
                <div class="flex flex-col items-center">
                    <input type="color" onchange="cmd('foreColor', this.value)" class="w-8 h-8">
                    <span class="text-[9px]">COLOR</span>
                </div>
            </div>

            <div id="insert" class="ribbon-content">
                <button onclick="document.getElementById('fileIn').click()" class="flex flex-col items-center p-2 border bg-white rounded">
                    <span>🖼️</span><span class="text-[9px]">PICTURE</span>
                </button>
                <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="addImg(this)">
                <button onclick="cmd('insertHorizontalRule')" class="p-2 border bg-white rounded">➖ Line</button>
            </div>
        </div>

        <div id="viewport">
            <div id="paper" contenteditable="true" spellcheck="false">
                <h1 style="text-align:center;">[TITLE]</h1>
                <p>Start typing or select a template...</p>
            </div>
        </div>
    </div>

    <script>
        function cmd(n, v=null) { document.execCommand(n, false, v); }
        
        function switchTab(e, id) {
            document.querySelectorAll('.ribbon-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function addImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    cmd('insertHTML', `<img src="${e.target.result}" style="max-width:100%; margin:10px 0; border-radius:4px;">`);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function savePDF() {
            const el = document.getElementById('paper');
            html2pdf().from(el).save('Hilsey_Doc.pdf');
        }

        function shareWA() {
            const text = document.getElementById('paper').innerText;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // AUTO-LOAD TEMPLATE TEXT
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const t = params.get('template');
            if(t === 'modern') {
                document.getElementById('paper').innerHTML = `<h1>[NAME]</h1><hr><p>Professional experience here...</p>`;
            }
        };
    </script>
</body>
</html>
