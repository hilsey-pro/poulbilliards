<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Professional Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --nav-bg: #1c2541; --ribbon-bg: #f3f4f6; --word-blue: #2b579a; }
        body { background: #0f172a; color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* MOBILE TOP BAR (Only visible on phones) */
        .mobile-header { display: none; background: var(--nav-bg); color: white; padding: 15px 20px; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 2000; }
        .menu-btn { font-size: 24px; background: none; border: none; color: white; cursor: pointer; }

        /* THE MAIN LAYOUT */
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* PROFESSIONAL SIDEBAR (Hidden on mobile until menu is clicked) */
        .sidebar { 
            width: 260px; background: var(--nav-bg); display: flex; flex-direction: column; 
            border-right: 1px solid rgba(255,255,255,0.1); z-index: 1500; transition: transform 0.3s ease;
        }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 15px 25px; color: #cbd5e1; text-decoration: none; font-size: 15px; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left-color: #3A86FF; }
        
        /* RIBBON */
        .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #e2e8f0; }
        .ribbon { background: var(--ribbon-bg); border-bottom: 1px solid #ccc; overflow-x: auto; flex-shrink: 0; white-space: nowrap; }
        .ribbon-tabs { display: flex; background: var(--word-blue); padding-left: 10px; }
        .tab { padding: 8px 20px; color: white; font-size: 13px; cursor: pointer; opacity: 0.8; }
        .tab.active { background: var(--ribbon-bg); color: var(--word-blue); opacity: 1; font-weight: bold; }
        
        .ribbon-tools { display: none; padding: 10px; gap: 15px; align-items: center; height: 80px; }
        .ribbon-tools.active { display: flex; }
        .tool-group { display: flex; flex-direction: column; align-items: center; border-right: 1px solid #d1d5db; padding: 0 15px; justify-content: center; }

        /* THE PAPER */
        .scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; }
        #paper { background: white; width: 100%; max-width: 850px; min-height: 1100px; padding: 60px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); outline: none; }

        /* RESPONSIVE LOGIC FOR PHONES */
        @media (max-width: 768px) {
            .mobile-header { display: flex; } /* Show the top bar with the ☰ button */
            .app-container { flex-direction: column; }
            
            /* Hide sidebar off-screen by default on mobile */
            .sidebar { position: absolute; top: 0; left: -100%; height: 100%; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
            /* When menu is open, slide it in */
            .sidebar.open { left: 0; }
            
            /* Mobile Overlay to close menu when clicking outside */
            .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
            .overlay.open { display: block; }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <div class="font-black italic text-xl tracking-wide">HILSEY PRO</div>
        <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
    </div>

    <div class="app-container">
        <div class="overlay" onclick="toggleMenu()"></div>

        <div class="sidebar" id="mainSidebar">
            <div class="p-6 text-2xl font-black italic border-b border-white/10 hidden md:block text-white">HILSEY PRO</div>
            
            <div class="flex-1 overflow-y-auto mt-2">
                <div class="px-6 py-2 text-xs font-bold text-gray-500 uppercase tracking-wider">Main Menu</div>
                <a href="/dashboard" class="nav-item">📊 Dashboard</a>
                <a href="/" class="nav-item active">✍️ Assignment Pad</a>
                <a href="/templates" class="nav-item">🎓 Templates</a>
                <a href="/hub" class="nav-item">💬 Discussion Hub</a>
                <a href="/forms" class="nav-item">📝 Forms</a>
                <a href="/cloud" class="nav-item">☁️ Student Cloud</a>

                <div class="px-6 py-2 mt-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</div>
                <a href="#" onclick="savePDF()" class="nav-item text-red-400">📄 Download PDF</a>
                <a href="#" onclick="shareWA()" class="nav-item text-green-400">📱 Share to WhatsApp</a>
            </div>
            
            <button class="md:hidden p-4 bg-red-600 text-white font-bold" onclick="toggleMenu()">✖ Close Menu</button>
        </div>

        <div class="editor-area">
            <div class="ribbon">
                <div class="ribbon-tabs">
                    <div class="tab active" onclick="showTab(event, 'home')">Home</div>
                    <div class="tab" onclick="showTab(event, 'insert')">Insert</div>
                </div>
                
                <div id="home" class="ribbon-tools active">
                    <div class="tool-group">
                        <div class="flex gap-1">
                            <button onclick="cmd('bold')" class="border p-1 bg-white font-bold px-3">B</button>
                            <button onclick="cmd('italic')" class="border p-1 bg-white italic px-3">I</button>
                            <button onclick="cmd('underline')" class="border p-1 bg-white underline px-3">U</button>
                        </div>
                    </div>
                    <div class="tool-group">
                        <select onchange="cmd('fontName', this.value)" class="p-1 border text-sm"><option>Arial</option><option>Times New Roman</option></select>
                        <select onchange="cmd('fontSize', this.value)" class="p-1 border text-sm mt-1"><option value="3">Size 12</option><option value="5">Size 18</option></select>
                    </div>
                    <div class="tool-group flex-row">
                        <span class="text-xs mr-2">Color:</span>
                        <input type="color" onchange="cmd('foreColor', this.value)">
                    </div>
                </div>

                <div id="insert" class="ribbon-tools">
                    <div class="tool-group">
                        <button onclick="document.getElementById('imgInp').click()" class="bg-white border p-2 rounded flex flex-col items-center">
                            <span class="text-lg">🖼️</span><span class="text-[10px] font-bold">PICTURE</span>
                        </button>
                        <input type="file" id="imgInp" class="hidden" accept="image/*" onchange="addImg(this)">
                    </div>
                </div>
            </div>

            <div class="scroll-area">
                <div id="paper" contenteditable="true" spellcheck="false">
                    <h1 style="text-align:center;">[DOCUMENT TITLE]</h1>
                    <p>Start editing your assignment or select a template...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // TOGGLE MOBILE MENU
        function toggleMenu() {
            document.getElementById('mainSidebar').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('open');
        }

        // TEXT EDITOR COMMANDS
        function cmd(n, v=null) { document.execCommand(n, false, v); }
        
        function showTab(e, id) {
            document.querySelectorAll('.ribbon-tools').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        // ADD IMAGE
        function addImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    cmd('insertHTML', `<img src="${e.target.result}" style="max-width:100%; margin:10px 0; border-radius:4px;">`);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // PDF & WHATSAPP
        function savePDF() {
            toggleMenu(); // Close menu first if on mobile
            const el = document.getElementById('paper');
            html2pdf().from(el).save('Hilsey_Professional_Doc.pdf');
        }

        function shareWA() {
            toggleMenu(); // Close menu first if on mobile
            const text = document.getElementById('paper').innerText;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
