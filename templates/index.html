<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Master Workstation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --word-blue: #2b579a; --ribbon-grey: #f3f4f6; --sidebar-dark: #1c2541; }
        body { background: #0f172a; color: #333; display: flex; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* SIDEBAR - Fixed & Scrollable */
        .sidebar { width: 240px; background: var(--sidebar-dark); flex-shrink: 0; color: white; display: flex; flex-direction: column; overflow-y: auto; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: #94a3b8; transition: 0.2s; font-size: 14px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid #3A86FF; }

        /* RIBBON */
        .ribbon-container { width: 100%; background: var(--ribbon-grey); border-bottom: 1px solid #ccc; z-index: 1000; overflow-x: auto; }
        .ribbon-tabs { background: var(--word-blue); display: flex; min-width: max-content; }
        .tab { padding: 10px 18px; color: white; font-size: 12px; cursor: pointer; opacity: 0.8; }
        .tab.active { background: var(--ribbon-grey); color: var(--word-blue); opacity: 1; font-weight: bold; }

        .ribbon-content { display: none; padding: 10px; gap: 15px; align-items: center; height: 95px; background: var(--ribbon-grey); min-width: max-content; }
        .ribbon-content.active { display: flex; }
        .tool-group { display: flex; flex-direction: column; align-items: center; border-right: 1px solid #d1d5db; padding: 0 10px; height: 100%; justify-content: center; }

        /* PAPER VIEWPORT */
        #viewport { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #e2e8f0; position: relative; }
        #paper { 
            background: white; width: 100%; max-width: 850px; min-height: 1100px; 
            padding: 60px; box-shadow: 0 0 20px rgba(0,0,0,0.1); outline: none; 
        }

        /* MOBILE BOTTOM ACTIONS - Fixed for Phone Users */
        .mobile-actions { 
            position: fixed; bottom: 20px; right: 20px; display: none; 
            flex-direction: column; gap: 10px; z-index: 2000; 
        }
        .fab { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* Hide sidebar on small phones to save space */
            .mobile-actions { display: flex; } /* Show quick buttons on phone */
            #paper { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-6 text-2xl font-black italic border-b border-white/10">HILSEY PRO</div>
        <nav class="mt-4 flex-1">
            <a href="/dashboard" class="nav-link">📊 Dashboard</a>
            <a href="/" class="nav-link active">✍️ Assignment Pad</a>
            <a href="/templates" class="nav-link">🎓 Templates</a>
            <a href="/hub" class="nav-link">💬 Discussion Hub</a>
            <a href="/cloud" class="nav-link">☁️ Student Cloud</a>
            <a href="/forms" class="nav-link">📝 Forms</a>
        </nav>
        <div class="p-4 text-[10px] text-gray-500 text-center uppercase">v2.0 Stable Build</div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div class="ribbon-container">
            <div class="ribbon-tabs">
                <div class="tab active" onclick="tab(event, 'home')">Home</div>
                <div class="tab" onclick="tab(event, 'insert')">Insert</div>
                <div class="tab" onclick="tab(event, 'review')">Review</div>
            </div>
            
            <div id="home" class="ribbon-content active">
                <div class="tool-group">
                    <select onchange="cmd('fontName', this.value)" class="text-xs border mb-1"><option>Arial</option><option>Times New Roman</option></select>
                    <div class="flex gap-1">
                        <button onclick="cmd('bold')" class="font-bold px-2 border bg-white">B</button>
                        <button onclick="cmd('italic')" class="italic px-2 border bg-white">I</button>
                        <input type="color" onchange="cmd('foreColor', this.value)" class="w-6 h-6 p-0">
                    </div>
                </div>
                <div class="tool-group">
                    <div class="flex gap-1">
                        <button onclick="cmd('justifyLeft')" class="px-1 border bg-white">L</button>
                        <button onclick="cmd('justifyCenter')" class="px-1 border bg-white">C</button>
                    </div>
                    <span class="text-[9px] mt-2 uppercase text-gray-400">Alignment</span>
                </div>
            </div>

            <div id="insert" class="ribbon-content">
                <div class="tool-group">
                    <button onclick="document.getElementById('picIn').click()" class="flex flex-col items-center">
                        <span class="text-xl">🖼️</span>
                        <span class="text-[10px] font-bold">PICTURES</span>
                    </button>
                    <input type="file" id="picIn" class="hidden" accept="image/*" onchange="addPic(this)">
                </div>
                <div class="tool-group">
                    <button onclick="cmd('insertHorizontalRule')" class="text-xl">➖</button>
                    <span class="text-[10px]">DIVIDER</span>
                </div>
            </div>

            <div id="review" class="ribbon-content">
                <div class="tool-group">
                    <button onclick="savePDF()" class="bg-red-600 text-white px-3 py-1 rounded text-xs font-bold">SAVE PDF</button>
                    <button onclick="shareWA()" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold mt-1">WHATSAPP</button>
                </div>
            </div>
        </div>

        <div id="viewport">
            <div id="paper" contenteditable="true" spellcheck="false">
                </div>
        </div>
    </div>

    <div class="mobile-actions">
        <button onclick="savePDF()" class="fab bg-red-600" title="Download PDF">PDF</button>
        <button onclick="shareWA()" class="fab bg-green-500" title="Share to WhatsApp">WA</button>
    </div>

    <script>
        function cmd(n, v=null) { document.execCommand(n, false, v); }
        
        function tab(e, id) {
            document.querySelectorAll('.ribbon-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function addPic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    cmd('insertHTML', `<img src="${e.target.result}" style="max-width:100%; margin:10px 0;">`);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function savePDF() {
            const el = document.getElementById('paper');
            html2pdf().from(el).save('Hilsey_Doc.pdf');
        }

        function shareWA() {
            const text = document.getElementById('paper').innerText;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // LOAD TEMPLATE
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const t = params.get('template') || 'modern';
            const lib = {
                'modern': `<h1>[NAME]</h1><hr><p>Professional details here...</p>`,
                'proposal': `<h1 style="color:#2b579a">PROJECT PROPOSAL</h1><p>Objectives...</p>`
            };
            document.getElementById('paper').innerHTML = lib[t] || lib['modern'];
        };
    </script>
</body>
</html>
