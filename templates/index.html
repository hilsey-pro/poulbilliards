<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Workstation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --bg: #0B132B; --sidebar: #1C2541; --primary: #3A86FF; --gold: #FFD700; }
        
        body { background: var(--bg); color: #EAEAEA; display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* Sidebar Navigation */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .nav-item { padding: 12px 20px; color: #94a3b8; display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .active { background: rgba(58, 134, 255, 0.1); color: var(--primary); border-left: 4px solid var(--primary); }

        /* The Main Scrollable Workspace */
        #editor-container { 
            flex: 1; 
            padding: 40px 20px;
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #0f172a; 
            scroll-behavior: smooth;
        }

        /* THE INFINITE PAPER: Grows as you type */
        #paper-wrapper { width: 100%; max-width: 850px; padding-bottom: 300px; }
        #paper { 
            background: white; 
            color: #1e293b; 
            width: 100%; 
            min-height: 1100px; /* One A4 page height */
            height: auto;       /* This makes it grow rolling down */
            padding: 80px; 
            box-shadow: 0 10px 60px rgba(0,0,0,0.7); 
            font-family: 'Georgia', serif; 
            line-height: 1.8;
            outline: none;
            word-wrap: break-word;
            border-radius: 4px;
        }

        /* STICKY TOOLBAR */
        .toolbar { 
            background: white; 
            padding: 10px 20px; 
            display: flex; 
            gap: 15px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            width: 100%; 
            max-width: 850px; 
            border-bottom: 1px solid #ddd;
            border-radius: 8px 8px 0 0;
        }
        .tool-btn { color: #333; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* DOWNLOAD BUTTONS UI */
        .download-zone { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-download { background: var(--gold); color: black; font-weight: 800; padding: 10px 20px; border-radius: 8px; font-size: 12px; transition: 0.3s; }
        .btn-download:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-8 text-center"><h1 class="text-3xl font-black italic text-white underline decoration-blue-500">HILSEY</h1></div>
        <nav>
            <a href="/dashboard" class="nav-item">📊 Dashboard</a>
            <a href="/" class="nav-item active">✍️ Assignment Pad</a>
            <a href="/templates" class="nav-item">🎓 Templates</a>
            <a href="/hub" class="nav-item">💬 Discussion Hub</a>
            <a href="/database" class="nav-item">☁️ Student Cloud</a>
        </nav>
    </div>

    <div id="editor-container">
        
        <div class="w-full max-w-[850px] mb-6 px-4">
            <input id="doc-title" type="text" placeholder="Title your document..." class="bg-transparent text-4xl font-bold outline-none text-white w-full border-b-2 border-transparent focus:border-blue-500 mb-4">
            
            <div class="flex justify-between items-center">
                <div class="download-zone">
                    <button onclick="downloadAsPDF()" class="btn-download shadow-lg">📄 DOWNLOAD PDF</button>
                    <button onclick="downloadAsWord()" class="btn-download shadow-lg" style="background: #EAEAEA;">📝 DOWNLOAD WORD</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="shareToWA()" class="bg-emerald-600 px-4 py-2 rounded-lg font-bold text-xs text-white">📲 Share WA</button>
                    <button onclick="saveToCloud()" class="bg-blue-600 px-4 py-2 rounded-lg font-bold text-xs text-white">💾 Save Cloud</button>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <button onclick="document.execCommand('bold')" class="tool-btn">B</button>
            <button onclick="document.execCommand('italic')" class="tool-btn italic">I</button>
            <button onclick="document.execCommand('underline')" class="tool-btn underline">U</button>
            <div class="w-px h-5 bg-gray-300 mx-2"></div>
            <button onclick="document.execCommand('insertUnorderedList')" class="tool-btn">Bullet Points</button>
        </div>

        <div id="paper-wrapper">
            <div id="paper" contenteditable="true" spellcheck="false">
                <p>Start your professional document or proposal here. As you type, this white page will grow longer and longer automatically...</p>
            </div>
        </div>
    </div>

    <script>
        // 1. PDF DOWNLOAD
        function downloadAsPDF() {
            const paper = document.getElementById('paper');
            const title = document.getElementById('doc-title').value || 'My-Hilsey-Doc';
            const opt = {
                margin: 0.5,
                filename: `${title}.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(paper).save();
        }

        // 2. WORD DOWNLOAD
        function downloadAsWord() {
            const content = document.getElementById('paper').innerHTML;
            const title = document.getElementById('doc-title').value || 'My-Hilsey-Doc';
            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${title}.doc`;
            link.click();
        }

        // 3. WHATSAPP & CLOUD
        function shareToWA() {
            const content = document.getElementById('paper').innerText;
            window.open(`https://wa.me/?text=${encodeURIComponent(content)}`, '_blank');
        }

        async function saveToCloud() {
            const content = document.getElementById('paper').innerHTML;
            const title = document.getElementById('doc-title').value;
            await fetch('/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: content, title: title})
            });
            alert("Document Synced Successfully!");
        }
    </script>
</body>
</html>
