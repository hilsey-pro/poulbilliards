<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Full Master Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --word-blue: #2b579a; --ribbon-bg: #f3f4f6; }
        body { background: #0f172a; color: #333; display: flex; height: 100vh; overflow: hidden; font-family: 'Segoe UI', system-ui; }
        
        /* Sidebar */
        .sidebar { width: 200px; background: #1c2541; flex-shrink: 0; color: white; border-right: 1px solid #334155; }

        /* The Ribbon UI */
        .ribbon-container { width: 100%; background: var(--ribbon-bg); border-bottom: 1px solid #ccc; z-index: 1000; }
        .tabs { background: var(--word-blue); display: flex; padding-left: 20px; }
        .tab-btn { padding: 8px 15px; color: white; font-size: 12px; cursor: pointer; border: none; background: transparent; opacity: 0.8; }
        .tab-btn.active { background: var(--ribbon-bg); color: var(--word-blue); opacity: 1; font-weight: bold; }

        .ribbon-panel { display: none; padding: 10px 20px; gap: 15px; align-items: center; height: 90px; background: var(--ribbon-bg); }
        .ribbon-panel.active { display: flex; }

        .group { display: flex; flex-direction: column; align-items: center; border-right: 1px solid #d1d5db; padding: 0 10px; height: 100%; justify-content: center; }
        .group-label { font-size: 10px; color: #777; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .controls { display: flex; gap: 4px; align-items: center; }

        /* Tool Buttons */
        .tool { padding: 4px 6px; border: 1px solid transparent; border-radius: 3px; cursor: pointer; background: transparent; font-size: 13px; }
        .tool:hover { background: #e2e8f0; border-color: #cbd5e1; }
        .tool.big { display: flex; flex-direction: column; align-items: center; font-size: 11px; min-width: 50px; }
        .tool.big i { font-size: 20px; margin-bottom: 2px; }

        /* Paper */
        #viewport { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px 0; }
        #paper { 
            background: white; width: 850px; min-height: 1100px; padding: 80px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); outline: none; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-5 font-black italic text-xl">HILSEY</div>
        <div class="p-4 text-xs opacity-50 uppercase tracking-widest">Navigation</div>
        <a href="/templates" class="block p-4 hover:bg-white/10">Templates</a>
        <a href="/" class="block p-4 bg-blue-600">Workstation</a>
    </div>

    <div class="flex-1 flex flex-col">
        <div class="ribbon-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab(event, 'home')">Home</button>
                <button class="tab-btn" onclick="openTab(event, 'insert')">Insert</button>
                <button class="tab-btn" onclick="openTab(event, 'layout')">Layout</button>
                <button class="tab-btn" onclick="openTab(event, 'review')">Review</button>
            </div>

            <div id="home" class="ribbon-panel active">
                <div class="group">
                    <div class="controls">
                        <select onchange="cmd('fontName', this.value)" class="text-xs border p-1"><option>Arial</option><option>Times New Roman</option><option>Calibri</option></select>
                        <select onchange="cmd('fontSize', this.value)" class="text-xs border p-1"><option value="3">12</option><option value="5">18</option><option value="7">36</option></select>
                    </div>
                    <div class="controls">
                        <button class="tool font-bold" onclick="cmd('bold')">B</button>
                        <button class="tool italic" onclick="cmd('italic')">I</button>
                        <button class="tool underline" onclick="cmd('underline')">U</button>
                        <input type="color" onchange="cmd('foreColor', this.value)" title="Text Color">
                    </div>
                    <span class="group-label">Font</span>
                </div>
                <div class="group">
                    <div class="controls">
                        <button class="tool" onclick="cmd('justifyLeft')">Left</button>
                        <button class="tool" onclick="cmd('justifyCenter')">Center</button>
                        <button class="tool" onclick="cmd('justifyRight')">Right</button>
                    </div>
                    <div class="controls">
                        <button class="tool" onclick="cmd('insertUnorderedList')">List</button>
                    </div>
                    <span class="group-label">Paragraph</span>
                </div>
            </div>

            <div id="insert" class="ribbon-panel">
                <div class="group">
                    <button class="tool big" onclick="document.getElementById('picInput').click()"><i>🖼️</i><span>Pictures</span></button>
                    <input type="file" id="picInput" class="hidden" onchange="addPic(this)">
                </div>
                <div class="group">
                    <button class="tool big" onclick="cmd('insertHorizontalRule')"><i>➖</i><span>Line</span></button>
                </div>
                <span class="group-label">Illustrations</span>
            </div>

            <div id="layout" class="ribbon-panel">
                <div class="group">
                    <button class="tool big" onclick="setPaper('portrait')"><i>📄</i><span>Portrait</span></button>
                    <button class="tool big" onclick="setPaper('landscape')"><i>📂</i><span>Landscape</span></button>
                </div>
                <span class="group-label">Page Setup</span>
            </div>

            <div id="review" class="ribbon-panel">
                <div class="group">
                    <button class="tool big" onclick="checkCount()"><i>📝</i><span>Word Count</span></button>
                </div>
                <div class="group">
                    <button class="tool big" onclick="downloadPDF()"><i>💾</i><span>Export PDF</span></button>
                </div>
                <span class="group-label">Proofing & Save</span>
            </div>
        </div>

        <div id="viewport">
            <div id="paper" contenteditable="true" spellcheck="false">
                <h1 style="text-align:center;">[TITLE]</h1>
                <p>Start typing your masterpiece here...</p>
            </div>
        </div>
    </div>

    <script>
        // THE BRAIN: These functions make the buttons actually work
        function cmd(name, val = null) {
            document.execCommand(name, false, val);
        }

        function openTab(evt, tabName) {
            let panels = document.getElementsByClassName("ribbon-panel");
            for (let p of panels) p.classList.remove("active");
            let tabs = document.getElementsByClassName("tab-btn");
            for (let t of tabs) t.classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function addPic(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    let img = `<img src="${e.target.result}" style="max-width:300px; margin:10px auto; display:block;">`;
                    cmd('insertHTML', img);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function setPaper(mode) {
            let p = document.getElementById('paper');
            if(mode === 'landscape') {
                p.style.width = "1100px"; p.style.minHeight = "850px";
            } else {
                p.style.width = "850px"; p.style.minHeight = "1100px";
            }
        }

        function checkCount() {
            let text = document.getElementById('paper').innerText;
            alert("Word Count: " + text.trim().split(/\s+/).length);
        }

        function downloadPDF() {
            const el = document.getElementById('paper');
            html2pdf().from(el).save('Hilsey_Project.pdf');
        }
    </script>
</body>
</html>
