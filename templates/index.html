<!DOCTYPE html>
<html>
<head>
    <title>Hilsey Pro | Student Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        .sidebar { width: 280px; background: #1e293b; padding: 20px; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; overflow-y: auto; background: #0f172a; }
        .btn-sidebar { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; text-decoration: none; display: block; color: white; }
        .btn-sidebar:hover { background: #4f46e5; transform: translateX(5px); }
        #notepad { background: white; color: black; padding: 40px; border-radius: 4px; min-height: 800px; width: 100%; max-width: 800px; margin: 0 auto; outline: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); font-family: 'Georgia', serif; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 class="text-xl font-bold text-indigo-400 mb-8 text-center underline italic text-indigo-400">HILSEY PRO</h2>
        
        <p class="text-xs text-gray-500 mb-2 uppercase tracking-widest">Navigation</p>
        <a href="/" class="btn-sidebar bg-indigo-900">✍️ Assignment Pad</a>
        <a href="/hub" class="btn-sidebar">📞 Discussion Hub</a>
        <a href="/database" class="btn-sidebar">📂 Student Cloud</a>

        <hr class="border-gray-700 my-4">

        <p class="text-xs text-gray-500 mb-2 uppercase tracking-widest">Cloud Tools</p>
        <button onclick="saveToCloud()" class="btn-sidebar w-full text-left bg-blue-600 hover:bg-blue-500">
            ☁️ Backup to Cloud
        </button>
        <button onclick="shareWhatsApp()" class="btn-sidebar w-full text-left">
            📲 Share to WhatsApp
        </button>

        <button onclick="downloadPDF()" class="w-full mt-auto bg-green-600 hover:bg-green-500 p-3 rounded font-bold shadow-lg">
            💾 Save as PDF
        </button>
        <a href="/logout" class="text-center text-xs text-red-400 mt-4 hover:underline">Logout</a>
    </div>

    <div class="main">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl font-bold mb-2">Welcome, {{ user }}</h1>
            <p class="text-sm text-gray-400 mb-8 italic">Drafting as: {{ user }}</p>
            
            <div id="notepad" contenteditable="true">
                <h1 style="text-align: center;">Assignment Title</h1>
                <p>Start typing...</p>
            </div>
        </div>
    </div>

    <script>
        function saveToCloud() {
            const content = document.getElementById('notepad').innerText;
            fetch('/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: content})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) alert("✅ Draft backed up to Cloud!");
            });
        }

        function downloadPDF() {
            const element = document.getElementById('notepad');
            html2pdf().set({margin: 0.5, filename: 'Assignment.pdf'}).from(element).save();
        }

        function shareWhatsApp() {
            const content = document.getElementById('notepad').innerText;
            window.open(`https://wa.me/?text=${encodeURIComponent(content)}`, '_blank');
        }
    </script>
</body>
</html>
