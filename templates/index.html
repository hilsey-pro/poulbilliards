<!DOCTYPE html>
<html>
<head>
    <title>Hilsey Pro | Workstation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0B132B; --sidebar: #1C2541; --primary: #3A86FF; --text: #EAEAEA; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 12px 20px; color: #94a3b8; display: flex; align-items: center; gap: 12px; text-decoration: none; border-left: 4px solid transparent; }
        .nav-item:hover, .active { background: rgba(58, 134, 255, 0.1); color: var(--primary); border-left-color: var(--primary); }
        
        #editor-container { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        #paper { background: white; color: #1e293b; width: 100%; max-width: 800px; min-height: 1000px; padding: 60px; border-radius: 4px; outline: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4); font-family: 'Georgia', serif; line-height: 1.6; }
        
        .ai-drawer { width: 300px; background: #111a36; border-left: 1px solid rgba(255,255,255,0.1); padding: 20px; overflow-y: auto; }
        .ai-btn { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; font-size: 12px; text-align: left; width: 100%; margin-bottom: 10px; transition: 0.2s; }
        .ai-btn:hover { border-color: var(--primary); background: rgba(58, 134, 255, 0.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-6"><h1 class="text-2xl font-black italic text-white underline decoration-blue-500">HILSEY</h1></div>
        <nav>
            <a href="/dashboard" class="nav-item">📊 Dashboard</a>
            <a href="/" class="nav-item active">✍️ Assignment Pad</a>
            <a href="/database" class="nav-item">☁️ Student Cloud</a>
            <a href="/hub" class="nav-item">📞 Discussion Hub</a>
        </nav>
    </div>

    <div id="editor-container">
        <div class="w-full max-w-[800px] flex justify-between items-center mb-6">
            <input id="doc-title" type="text" placeholder="Assignment Title..." class="bg-transparent text-2xl font-bold outline-none border-b border-transparent focus:border-blue-500 transition w-2/3">
            <div class="flex gap-2">
                <button onclick="saveWork()" class="bg-blue-600 px-4 py-2 rounded font-bold text-xs hover:bg-blue-500 transition">Save to Cloud</button>
            </div>
        </div>
        <div id="paper" contenteditable="true">
            <p>Start your academic journey here...</p>
        </div>
    </div>

    <div class="ai-drawer">
        <h3 class="text-sm font-bold text-blue-400 mb-4 uppercase tracking-widest">AI Study Assistant</h3>
        
        <button onclick="callAI('polish')" class="ai-btn">✨ <b>Polish Draft</b><br><span class="opacity-50 text-[10px]">Fix grammar & tone</span></button>
        <button onclick="callAI('summarize')" class="ai-btn">📝 <b>Summarize</b><br><span class="opacity-50 text-[10px]">Get a quick recap</span></button>
        <button onclick="callAI('suggest')" class="ai-btn">🔍 <b>Research Help</b><br><span class="opacity-50 text-[10px]">Suggest references</span></button>

        <div id="ai-response" class="mt-6 p-4 bg-slate-900/50 rounded-lg text-xs leading-relaxed border border-slate-800 text-gray-300 min-h-[100px]">
            AI suggestions will appear here...
        </div>
    </div>

    <script>
        async function callAI(mode) {
            const content = document.getElementById('paper').innerText;
            const resBox = document.getElementById('ai-response');
            resBox.innerText = "Thinking...";
            
            const response = await fetch('/ai-assist', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mode: mode, content: content})
            });
            
            const data = await response.json();
            if(data.success) {
                resBox.innerText = data.result;
            } else {
                resBox.innerText = "Error: " + data.error;
            }
        }

        async function saveWork() {
            const content = document.getElementById('paper').innerText;
            const title = document.getElementById('doc-title').value;
            const res = await fetch('/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: content, title: title})
            });
            if(res.ok) alert("Draft synced to Cloud!");
        }
    </script>
</body>
</html>
