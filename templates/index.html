<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Hilsey Pro | Workstation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0B132B; --sidebar: #1C2541; --primary: #3A86FF; --text: #EAEAEA; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 12px 20px; color: #94a3b8; display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .active { background: rgba(58, 134, 255, 0.1); color: var(--primary); }
        #paper { background: white; color: #1e293b; width: 100%; max-width: 800px; min-height: 1000px; padding: 60px; border-radius: 4px; outline: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4); font-family: 'Georgia', serif; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="p-6"><h1 class="text-2xl font-black italic text-white underline decoration-blue-500">HILSEY</h1></div>
        <nav>
            <a href="/dashboard" class="nav-item">📊 Dashboard</a>
            <a href="/" class="nav-item active">✍️ Assignment Pad</a>
            <a href="/templates" class="nav-item">🎓 Templates</a>
            <a href="/hub" class="nav-item">💬 Discussion Hub</a>
            <a href="/database" class="nav-item">☁️ Student Cloud</a>
        </nav>
    </div>

    <div class="flex-1 p-10 overflow-y-auto flex flex-col items-center">
        <div class="w-full max-w-[800px] flex justify-between items-center mb-6">
            <input id="doc-title" type="text" placeholder="Untitled Draft" class="bg-transparent text-3xl font-bold outline-none text-white w-2/3">
            <div class="flex gap-2">
                <button onclick="shareToWhatsApp()" class="bg-emerald-600 px-4 py-2 rounded font-bold text-xs hover:bg-emerald-500 transition">📲 Share to WA</button>
                <button onclick="saveWork()" class="bg-blue-600 px-4 py-2 rounded font-bold text-xs">Save Cloud</button>
            </div>
        </div>
        <div id="paper" contenteditable="true">
            <p>Ready to build your career...</p>
        </div>
    </div>

    <script>
        function shareToWhatsApp() {
            const title = document.getElementById('doc-title').value || "My Document";
            const content = document.getElementById('paper').innerText;
            const text = `*${title}*\n\n${content}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }
        async function saveWork() {
            const content = document.getElementById('paper').innerHTML;
            const title = document.getElementById('doc-title').value;
            await fetch('/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: content, title: title})
            });
            alert("Saved!");
        }
    </script>
</body>
</html>
