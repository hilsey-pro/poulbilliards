<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Discussion Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f172a; font-family: sans-serif; overflow: hidden; }
        
        /* THE PERMANENT LEFT SIDEBAR */
        .sidebar { width: 220px; background: #0b132b; color: white; display: flex; flex-direction: column; border-right: 1px solid #334155; flex-shrink: 0; }
        .nav-item { padding: 15px 20px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 14px; border-left: 4px solid transparent; }
        .nav-item:hover, .active-link { background: rgba(58, 134, 255, 0.1); color: white; border-left-color: #3a86ff; }
        .label { padding: 20px 20px 5px; font-size: 10px; color: #475569; font-weight: bold; text-transform: uppercase; }

        /* MAIN CONTENT AREA */
        .main-view { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #f1f5f9; overflow-y: auto; }
        
        /* VIDEO CALL BOX */
        .video-container { background: #000; border-radius: 12px; height: 400px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .video-controls { position: absolute; bottom: 20px; display: flex; gap: 15px; }
        .control-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 12px; rounded-full; cursor: pointer; backdrop-filter: blur(5px); }
        .control-btn:hover { background: #3a86ff; }

        @media (max-width: 600px) {
            .sidebar { width: 70px; }
            .nav-item span { display: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 25px; font-weight: bold; font-style: italic; color: #3a86ff; border-bottom: 1px solid #1e293b; text-align: center;">HILSEY PRO</div>
        
        <div class="label">Navigation</div>
        <a href="dashboard.html" class="nav-item"><span>📊 Dashboard</span></a>
        <a href="workspace.html" class="nav-item"><span>✍️ Workspace</span></a>
        <a href="templates.html" class="nav-item"><span>🎓 Templates</span></a>
        <a href="hub.html" class="nav-item active-link"><span>💬 Discussion Hub</span></a>
        <a href="lecture.html" class="nav-item"><span>👨‍🏫 Lecturer Hub</span></a>
    </div>

    <div class="main-view">
        <h1 class="text-2xl font-bold text-slate-800 mb-4">Discussion Hub & Video Call</h1>
        
        <div class="video-container">
            <div class="text-white text-center">
                <p class="text-lg">Waiting for others to join...</p>
                <p class="text-xs opacity-50 mt-2">TIA Study Group Session</p>
            </div>
            
            <div class="video-controls">
                <button class="control-btn">🎤 Mute</button>
                <button class="control-btn">📷 Camera</button>
                <button class="control-btn bg-red-600">📵 End</button>
            </div>
        </div>

        <div class="mt-6 bg-white p-4 rounded-lg shadow">
            <h3 class="font-bold border-b pb-2 mb-2">Live Chat</h3>
            <div class="h-32 text-sm text-gray-500 overflow-y-auto">
                <p><b>Lecturer:</b> Welcome to the discussion. Please open your Assignment Pad.</p>
            </div>
            <div class="flex mt-2">
                <input type="text" placeholder="Type a message..." class="flex-1 border p-2 rounded-l">
                <button class="bg-blue-600 text-white px-4 rounded-r">Send</button>
            </div>
        </div>
    </div>

</body>
</html>
