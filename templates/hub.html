<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Discussion Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f172a; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 220px; background: #0b132b; color: white; display: flex; flex-direction: column; border-right: 1px solid #334155; flex-shrink: 0; }
        .nav-item { padding: 15px 20px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 14px; border-left: 4px solid transparent; }
        .active-link { background: rgba(58, 134, 255, 0.1); color: white; border-left-color: #3a86ff; }
        .main-view { flex: 1; padding: 20px; background: #f1f5f9; display: flex; flex-direction: column; overflow-y: auto; }
        .video-box { background: #000; border-radius: 12px; height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: white; }
        @media (max-width: 600px) { .sidebar { width: 70px; } .nav-item span { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 25px; font-weight: bold; color: #3a86ff; text-align: center;">HILSEY PRO</div>
        <a href="dashboard.html" class="nav-item"><span>📊 Dashboard</span></a>
        <a href="workspace.html" class="nav-item"><span>✍️ Workspace</span></a>
        <a href="templates.html" class="nav-item"><span>🎓 Templates</span></a>
        <a href="hub.html" class="nav-item active-link"><span>💬 Discussion Hub</span></a>
        <a href="lecture.html" class="nav-item"><span>👨‍🏫 Lecturer Hub</span></a>
    </div>
    <div class="main-view">
        <h1 class="text-2xl font-bold mb-4">Video Discussion Hub</h1>
        <div class="video-box shadow-2xl">
            <p class="text-lg font-semibold">Video Call Active</p>
            <p class="text-xs opacity-60">TIA Study Group Session #104</p>
            <div class="absolute bottom-6 flex gap-4">
                <button class="bg-gray-700 p-3 rounded-full">🎤</button>
                <button class="bg-gray-700 p-3 rounded-full">📷</button>
                <button class="bg-red-600 px-6 py-2 rounded-full font-bold">End Call</button>
            </div>
        </div>
        <div class="mt-6 bg-white p-4 rounded-lg shadow-sm border flex-1 flex flex-col">
            <h3 class="font-bold border-b pb-2 mb-2">Live Chat</h3>
            <div class="flex-1 overflow-y-auto text-sm text-gray-600">
                <p><b>System:</b> Connected to TIA Server.</p>
            </div>
            <div class="flex mt-3 border-t pt-3">
                <input type="text" placeholder="Type message..." class="flex-1 border p-2 rounded-l outline-none">
                <button class="bg-blue-600 text-white px-6 rounded-r">Send</button>
            </div>
        </div>
    </div>
</body>
</html>
