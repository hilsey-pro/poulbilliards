<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f172a; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 220px; background: #0b132b; color: white; display: flex; flex-direction: column; border-right: 1px solid #334155; flex-shrink: 0; }
        .nav-item { padding: 15px 20px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 14px; border-left: 4px solid transparent; }
        .active-link { background: rgba(58, 134, 255, 0.1); color: white; border-left-color: #3a86ff; }
        .content { flex: 1; display: flex; flex-direction: column; background: #e2e8f0; overflow: hidden; }
        .toolbar { background: #fff; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #cbd5e1; }
        .paper-zone { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; justify-content: center; }
        #paper { background: white; width: 100%; max-width: 800px; min-height: 1000px; padding: 60px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); outline: none; }
        @media (max-width: 600px) { .sidebar { width: 70px; } .nav-item span { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 25px; font-weight: bold; color: #3a86ff; text-align: center;">HILSEY PRO</div>
        <a href="dashboard.html" class="nav-item"><span>📊 Dashboard</span></a>
        <a href="workspace.html" class="nav-item active-link"><span>✍️ Workspace</span></a>
        <a href="templates.html" class="nav-item"><span>🎓 Templates</span></a>
        <a href="hub.html" class="nav-item"><span>💬 Discussion Hub</span></a>
        <a href="lecture.html" class="nav-item"><span>👨‍🏫 Lecturer Hub</span></a>
        <div class="mt-auto border-t border-white/10">
            <button onclick="savePDF()" class="nav-item w-full text-left bg-transparent border-none text-red-400 cursor-pointer"><span>📄 Save PDF</span></button>
            <button onclick="shareWA()" class="nav-item w-full text-left bg-transparent border-none text-green-400 cursor-pointer"><span>📱 WhatsApp</span></button>
        </div>
    </div>
    <div class="content">
        <div class="toolbar">
            <button onclick="document.execCommand('bold')" class="border p-2 bg-white px-4 font-bold">B</button>
            <button onclick="document.execCommand('italic')" class="border p-2 bg-white px-4 italic">I</button>
            <button onclick="document.getElementById('imgInp').click()" class="border p-2 bg-blue-50 px-4">🖼️ Image</button>
            <input type="file" id="imgInp" style="display: none;" accept="image/*" onchange="addPic(this)">
        </div>
        <div class="paper-zone">
            <div id="paper" contenteditable="true" spellcheck="false">
                <h1 style="text-align: center;">Assignment Pad</h1>
                <p>Start writing your TIA coursework here...</p>
            </div>
        </div>
    </div>
    <script>
        function addPic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = `<img src="${e.target.result}" style="max-width:100%; margin: 10px 0;">`;
                    document.execCommand('insertHTML', false, img);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function savePDF() { html2pdf().from(document.getElementById('paper')).save('My_Assignment.pdf'); }
        function shareWA() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('paper').innerText)}`, '_blank'); }
    </script>
</body>
</html>
