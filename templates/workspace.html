<!DOCTYPE html>
<html>
<head>
    <title>Hilsey Pro | Group Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0B132B; --sidebar: #1C2541; --primary: #3A86FF; --text: #EAEAEA; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 12px 20px; color: #94a3b8; display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-item:hover, .active { background: rgba(58, 134, 255, 0.1); color: var(--primary); }
        .task-card { background: #1C2541; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-6"><h1 class="text-2xl font-black italic text-white underline decoration-blue-500">HILSEY</h1></div>
        <nav>
            <a href="/dashboard" class="nav-item">📊 Dashboard</a>
            <a href="/" class="nav-item">✍️ Assignment Pad</a>
            <a href="/workspace" class="nav-item active">👥 Group Workspace</a>
            <a href="/database" class="nav-item">☁️ Student Cloud</a>
        </nav>
    </div>

    <div class="flex-1 p-10 overflow-y-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold">Group Collaboration</h2>
                <p class="text-gray-400">Shared task board for group projects</p>
            </div>
            <button onclick="addTask()" class="bg-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-500 transition shadow-lg">
                + Post New Task
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="p-4 bg-slate-900/40 rounded-xl border border-dashed border-slate-700">
                <h3 class="text-xs uppercase text-gray-500 font-bold mb-4 tracking-widest">Shared Task Feed</h3>
                <div id="task-list">
                    {% for project in projects %}
                    <div class="task-card">
                        <p class="text-sm font-semibold mb-2">{{ project.task }}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded">By: {{ project.user }}</span>
                            <span class="text-[10px] text-gray-500 italic">{{ project.status }}</span>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script>
        async function addTask() {
            const task = prompt("What needs to be done?");
            if (task) {
                const res = await fetch('/add-task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({task: task})
                });
                if(res.ok) location.reload();
            }
        }
    </script>
</body>
</html>
