<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Pro | Student Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; min-height: 100vh; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 sticky top-0 z-10">
        <div>
            <h1 class="text-2xl font-bold text-indigo-400 flex items-center gap-2">
                📂 Student Cloud Storage
            </h1>
            <p class="text-xs text-gray-400">Secure academic document repository</p>
        </div>
        <a href="/" class="bg-indigo-600 px-6 py-2 rounded-full font-bold hover:bg-indigo-500 transition shadow-lg text-sm">
            ⬅ Back to Drafting
        </a>
    </div>

    <div class="max-w-6xl mx-auto mt-10 p-6">
        <div class="glass-card p-8 rounded-2xl shadow-2xl">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-xl font-semibold">Your Saved Assignments</h2>
                    <p class="text-sm text-gray-400">Access your drafts from any device.</p>
                </div>
                <div class="text-right">
                    <span id="doc-count" class="text-xs bg-slate-700 px-3 py-1 rounded-full text-indigo-300">Loading...</span>
                </div>
            </div>
            
            <div class="overflow-hidden rounded-lg border border-slate-700">
                <table class="w-full text-left border-collapse bg-slate-800/30">
                    <thead class="bg-slate-800">
                        <tr class="text-indigo-300 uppercase text-xs tracking-wider">
                            <th class="py-4 px-6">Document Name</th>
                            <th class="py-4 px-6">Date Saved</th>
                            <th class="py-4 px-6">Type</th>
                            <th class="py-4 px-6 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="student-docs" class="divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>

            <div id="empty-state" class="hidden mt-8 text-center py-12 border-2 border-dashed border-slate-700 rounded-xl">
                <div class="text-4xl mb-3">📄</div>
                <p class="text-gray-500 italic">No drafts found in your cloud.</p>
                <p class="text-xs text-gray-600 mt-1">Click "Backup to Cloud" on the Notepad to save work here.</p>
            </div>
        </div>
    </div>

    <script>
        // FUNCTION TO LOAD DOCUMENTS FROM THE SERVER
        async function loadDocs() {
            const response = await fetch('/get-docs');
            const docs = await response.json();
            
            const tableBody = document.getElementById('student-docs');
            const emptyState = document.getElementById('empty-state');
            const docCount = document.getElementById('doc-count');
            
            tableBody.innerHTML = ''; // Clear the table first

            if (docs.length === 0) {
                emptyState.classList.remove('hidden');
                docCount.innerText = "0 Files Found";
            } else {
                emptyState.classList.add('hidden');
                docCount.innerText = `${docs.length} Files Found`;
                
                docs.forEach(doc => {
                    const row = `
                        <tr class="hover:bg-slate-700/40 transition">
                            <td class="py-4 px-6 font-medium text-indigo-200">${doc.filename}</td>
                            <td class="py-4 px-6 text-gray-400 text-sm">${doc.date}</td>
                            <td class="py-4 px-6">
                                <span class="bg-indigo-900/50 text-indigo-300 text-[10px] px-2 py-1 rounded border border-indigo-500/30">CLOUD DRAFT</span>
                            </td>
                            <td class="py-4 px-6 text-right">
                                <button onclick="viewDoc('${doc.filename}')" class="text-indigo-400 hover:text-white font-bold transition text-sm">View Details ↗</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            }
        }

        function viewDoc(name) {
            alert("Viewing detail for: " + name + "\nFull database integration coming in the next update!");
        }

        // Run this when the page loads
        window.onload = loadDocs;
    </script>

</body>
</html>
