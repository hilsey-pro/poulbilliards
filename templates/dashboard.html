<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f172a; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 220px; background: #0b132b; color: white; display: flex; flex-direction: column; border-right: 1px solid #334155; flex-shrink: 0; }
        .nav-item { padding: 15px 20px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 14px; border-left: 4px solid transparent; }
        .active-link { background: rgba(58, 134, 255, 0.1); color: white; border-left-color: #3a86ff; }
        .main-view { flex: 1; padding: 30px; background: #f1f5f9; overflow-y: auto; }
        @media (max-width: 600px) { .sidebar { width: 70px; } .nav-item span { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 25px; font-weight: bold; color: #3a86ff; text-align: center;">HILSEY PRO</div>
        <a href="dashboard.html" class="nav-item active-link"><span>📊 Dashboard</span></a>
        <a href="workspace.html" class="nav-item"><span>✍️ Workspace</span></a>
        <a href="templates.html" class="nav-item"><span>🎓 Templates</span></a>
        <a href="hub.html" class="nav-item"><span>💬 Discussion Hub</span></a>
        <a href="lecture.html" class="nav-item"><span>👨‍🏫 Lecturer Hub</span></a>
    </div>
    <div class="main-view">
        <h1 class="text-2xl font-bold mb-6">Student Dashboard</h1>
        <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6">
            <p class="font-bold text-red-700">New TIA Assignment</p>
            <p class="text-sm text-red-600">Lecturer posted a new task. Check the Student Cloud.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded shadow">
                <h3 class="font-bold">Recent Activity</h3>
                <p class="text-sm text-gray-500 mt-2">No new messages in Discussion Hub.</p>
            </div>
        </div>
    </div>
</body>
</html>
