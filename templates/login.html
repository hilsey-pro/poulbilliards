<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hilsey Pro | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen text-white">
    <div class="bg-slate-800 p-10 rounded-2xl shadow-2xl w-96 border border-slate-700">
        <h1 class="text-3xl font-bold text-indigo-400 mb-2 text-center italic">HILSEY PRO</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Student & Lecturer Access Portal</p>
        
        <form action="/login" method="POST">
            <div class="mb-4">
                <label class="block text-xs uppercase text-gray-500 font-bold mb-1">Student ID / Email</label>
                <input type="text" name="username" class="w-full p-3 rounded bg-slate-900 border border-slate-700 focus:border-indigo-500 outline-none" required>
            </div>
            <div class="mb-6">
                <label class="block text-xs uppercase text-gray-500 font-bold mb-1">Access Pin</label>
                <input type="password" name="password" class="w-full p-3 rounded bg-slate-900 border border-slate-700 focus:border-indigo-500 outline-none" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-lg font-bold transition shadow-lg">
                Enter Suite
            </button>
        </form>
        
        <p class="mt-6 text-center text-xs text-gray-500">
            Forgot your pin? Contact the Lecturer.
        </p>
    </div>
</body>
</html>
