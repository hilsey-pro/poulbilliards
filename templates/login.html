<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Pro | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen text-white font-family: sans-serif;">
    <div class="bg-slate-800 p-10 rounded-2xl shadow-2xl w-96 border border-slate-700">
        <h1 class="text-3xl font-bold text-indigo-400 mb-2 text-center italic tracking-tighter">HILSEY PRO</h1>
        <p class="text-gray-400 text-center mb-8 text-sm uppercase tracking-widest">Student Suite Access</p>
        
        <form action="/login" method="POST">
            <div class="mb-4">
                <label class="block text-xs uppercase text-gray-500 font-bold mb-1">Your Name / ID</label>
                <input type="text" name="username" placeholder="e.g. Student 01" class="w-full p-3 rounded bg-slate-900 border border-slate-700 focus:border-indigo-500 outline-none transition" required>
            </div>
            <div class="mb-6">
                <label class="block text-xs uppercase text-gray-500 font-bold mb-1">Access Pin</label>
                <input type="password" name="password" placeholder="****" class="w-full p-3 rounded bg-slate-900 border border-slate-700 focus:border-indigo-500 outline-none transition" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-lg font-bold transition-all shadow-lg active:scale-95">
                Login to Suite
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-slate-700 text-center">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Secure Academic Environment</p>
        </div>
    </div>
</body>
</html>
