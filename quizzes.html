<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Hub - Exam System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--secondary-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
        }
        .timer-box {
            background: #020617;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1.5rem;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            margin-bottom: 2rem;
            display: inline-block;
        }
        .option {
            background: #0f172a;
            padding: 1.25rem;
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
            border: 1px solid #334155;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
        }
        .option:hover { border-color: var(--accent-color); }
        .option.selected {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }
    </style>
</head>
<body>

    <main class="main-content" style="margin-left: 0; width: 100%;">
        <div class="quiz-container">
            <div class="flex-row" style="margin-bottom: 2rem;">
                <div>
                    <h2 id="qTitle">Weekly Logic Quiz</h2>
                    <p style="color: var(--text-muted);">Question <span id="qNum">1</span> of 5</p>
                </div>
                <div class="timer-box" id="timer">10:00</div>
            </div>

            <div id="quizContent">
                <h3 id="questionText" style="margin-bottom: 2rem; font-size: 1.25rem; line-height: 1.4;">
                    What is the next number in the sequence: 2, 4, 8, 16, ...?
                </h3>
                <div id="options">
                    <div class="option" onclick="selectOption(this, 0)">A) 24</div>
                    <div class="option" onclick="selectOption(this, 1)">B) 32</div>
                    <div class="option" onclick="selectOption(this, 2)">C) 64</div>
                    <div class="option" onclick="selectOption(this, 3)">D) 128</div>
                </div>
            </div>

            <div class="flex-row mt-2" style="margin-top: 3rem;">
                <button style="width: auto; background: transparent; border: 1px solid #334155;" onclick="window.location.href='study-hub.html'">Quit</button>
                <button style="width: auto;" onclick="nextQuestion()" id="nextBtn">Next Question</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const quizData = [
            { q: "What is the next number in the sequence: 2, 4, 8, 16, ...?", options: ["24", "32", "64", "128"], correct: 1 },
            { q: "Who is known as the father of modern economics?", options: ["John Maynard Keynes", "Adam Smith", "Karl Marx", "Milton Friedman"], correct: 1 },
            { q: "Which of the following is a liability?", options: ["Accounts Receivable", "Inventory", "Accounts Payable", "Cash"], correct: 2 },
            { q: "In SWOT analysis, what does 'W' stand for?", options: ["Workforce", "Weakness", "Wealth", "Web-presence"], correct: 1 },
            { q: "What is the primary goal of financial management?", options: ["Maximize Sales", "Maximize Profit", "Maximize Shareholder Wealth", "Minimize Risk"], correct: 2 }
        ];

        let currentQ = 0;
        let score = 0;
        let timeLeft = 600; // 10 minutes

        function updateTimer() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft > 0) timeLeft--;
            else finishQuiz();
        }

        setInterval(updateTimer, 1000);

        function selectOption(el, index) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            el.dataset.selected = index;
        }

        function nextQuestion() {
            const selected = document.querySelector('.option.selected');
            if (!selected) {
                alert("Please select an answer!");
                return;
            }

            if (parseInt(selected.dataset.selected) === quizData[currentQ].correct) score++;

            currentQ++;
            if (currentQ < quizData.length) {
                document.getElementById('qNum').innerText = currentQ + 1;
                document.getElementById('questionText').innerText = quizData[currentQ].q;
                const opts = document.getElementById('options').children;
                quizData[currentQ].options.forEach((opt, i) => {
                    opts[i].innerText = `${String.fromCharCode(65 + i)}) ${opt}`;
                    opts[i].classList.remove('selected');
                });
                if (currentQ === quizData.length - 1) document.getElementById('nextBtn').innerText = "Submit Quiz";
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            const container = document.querySelector('.quiz-container');
            container.innerHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 4rem; margin-bottom: 1rem;">🎓</div>
                    <h2>Quiz Completed!</h2>
                    <p style="color: var(--text-muted); font-size: 1.25rem; margin-bottom: 2rem;">Your Score: ${score} / ${quizData.length}</p>
                    <div style="background: #0f172a; padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 2rem;">
                        <p style="margin: 0; color: var(--accent-color); font-weight: bold;">Result: ${score >= 3 ? 'PASSED' : 'FAILED'}</p>
                    </div>
                    <button style="width: auto; padding: 0.75rem 2rem;" onclick="navigateTo('study-hub.html')">Back to Study Hub</button>
                </div>
            `;
            notify("Quiz results saved to your profile.");
        }
    </script>
</body>
</html>
