<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Live Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f172a; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 240px; background: #0b132b; color: white; display: flex; flex-direction: column; border-right: 1px solid #1e293b; flex-shrink: 0; }
        .nav-item { padding: 15px 24px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 14px; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-item:hover { background: #1e293b; color: white; }
        .active-link { background: rgba(58, 134, 255, 0.1); color: #3a86ff; border-left-color: #3a86ff; font-weight: bold; }
        #meet-container { flex: 1; background: #000; border-radius: 20px; margin: 15px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-8 text-2xl font-black text-blue-500 tracking-tighter italic uppercase">Hilsey Pro</div>
        <nav class="flex-1">
            <a href="dashboard.html" class="nav-item"><span>📊 Dashboard</span></a>
            <a href="workspace.html" class="nav-item"><span>✍️ Workspace</span></a>
            <a href="templates.html" class="nav-item"><span>🎓 Templates</span></a>
            <a href="hub.html" class="nav-item active-link"><span>💬 Discussion Hub</span></a>
            <a href="lecture.html" class="nav-item"><span>👨‍🏫 Lecturer Hub</span></a>
        </nav>
    </div>

    <div class="flex-1 flex flex-col bg-slate-900">
        <div class="p-4 flex justify-between items-center bg-slate-800 border-b border-slate-700">
            <div>
                <h2 class="text-white font-bold">TIA Live Lecture Room</h2>
                <p class="text-[10px] text-green-400 font-mono">ENCRYPTED & ACTIVE</p>
            </div>
            <div class="text-slate-400 text-xs italic">If camera is black, click the 'Padlock' 🔒 icon in your browser address bar and 'Allow' Camera.</div>
        </div>

        <div id="meet-container"></div>
    </div>

    <script>
        window.onload = () => {
            const domain = 'meet.jit.si';
            const options = {
                roomName: 'HilseyPro_TIA_Global_Room_2026', // Unique Room Name
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-container'),
                // Disable the "Pre-join" screen so it goes straight to the call
                configOverwrite: { prejoinPageEnabled: false },
                interfaceConfigOverwrite: {
                    // This shows all the "Cool" buttons you liked
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                        'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                        'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
                        'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                        'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone', 'security'
                    ],
                }
            };
            const api = new JitsiMeetExternalAPI(domain, options);
        };
    </script>
</body>
</html>
