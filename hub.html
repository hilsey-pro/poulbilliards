<div class="flex-1 flex flex-col h-screen bg-slate-900">
    <div class="flex-1 p-4">
        <div class="relative w-full h-full bg-black rounded-3xl overflow-hidden border-2 border-slate-700 shadow-2xl">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID" class="w-full h-full"></iframe>
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-4">
                <button class="bg-red-500 p-4 rounded-full">🔇</button>
                <button class="bg-slate-700 p-4 rounded-full">🎥</button>
                <button class="bg-red-600 px-8 py-2 rounded-full text-white font-bold">Leave Call</button>
            </div>
        </div>
    </div>
    <div class="h-64 bg-slate-800 p-6 flex flex-col border-t border-slate-700">
        <div id="chat-box" class="flex-1 overflow-y-auto text-slate-300 text-sm mb-4 space-y-2">
            <p><b class="text-blue-400">Admin:</b> Welcome to the TIA Discussion Hub.</p>
        </div>
        <div class="flex gap-2">
            <input type="text" id="chat-input" placeholder="Type message..." class="flex-1 bg-slate-900 border-none p-3 rounded-lg text-white">
            <button onclick="sendMsg()" class="bg-blue-600 px-6 rounded-lg font-bold text-white">Send</button>
        </div>
    </div>
</div>
<script>
    function sendMsg() {
        const input = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');
        if(input.value) {
            box.innerHTML += `<p><b class="text-green-400">You:</b> ${input.value}</p>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;
        }
    }
</script>
