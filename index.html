<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center h-screen">
    <div class="bg-slate-800 p-8 rounded-lg shadow-xl w-96">
        <h1 class="text-2xl font-bold mb-6 text-blue-400">Hilsey Pro Login</h1>
        <input type="email" id="email" placeholder="Email" class="w-full p-2 mb-4 bg-slate-700 rounded border border-slate-600 outline-none focus:border-blue-500">
        <input type="password" id="password" placeholder="Password" class="w-full p-2 mb-6 bg-slate-700 rounded border border-slate-600 outline-none focus:border-blue-500">
        <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-bold transition">Sign In</button>
        <p id="status" class="mt-4 text-sm text-gray-400 text-center"></p>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
