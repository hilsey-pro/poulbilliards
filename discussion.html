<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Discussion Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-box { background: #000; border-radius: 40px; aspect-ratio: 16/9; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        #local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body class="bg-slate-50 flex h-screen font-sans">
    <div class="flex-1 p-10 flex flex-col">
        <header class="mb-8 flex justify-between items-center">
            <h2 class="text-3xl font-black italic uppercase">Discussion Room</h2>
            <button onclick="window.open('https://wa.me/?text=Join our Live Discussion on Hilsey Biz!', '_blank')" class="bg-[#25D366] text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase">SHARE LINK ON WHATSAPP</button>
        </header>
        <div class="video-box">
            <video id="local-video" autoplay playsinline class="bg-black"></video>
        </div>
    </div>
    <script>
        async function start() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = s;
            } catch (e) { alert("Camera/Mic not accessible"); }
        }
        window.onload = start;
    </script>
</body>
</html>
