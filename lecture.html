<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Instructor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen font-sans">
    <div class="bg-white w-full max-w-lg rounded-[40px] p-16 shadow-2xl text-center border-b-8 border-blue-600">
        <h1 class="text-4xl font-black italic text-slate-900 mb-4 uppercase tracking-tighter">Welcome, Instructor</h1>
        <p class="text-slate-400 text-sm font-black uppercase mb-12">Staff Secure Gateway</p>

        <p class="text-slate-700 font-bold mb-12 leading-relaxed">You have successfully entered the instructor management portal. Please use the controls below to manage your courses and students.</p>

        <button onclick="logout()" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase tracking-widest hover:bg-blue-600 transition">Logout</button>
    </div>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
