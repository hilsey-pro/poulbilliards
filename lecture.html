<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Hilsey Pro | Secure Lecturer Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div id="lock-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl text-slate-800 w-96 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-blue-600">Verification Required</h2>
            <p class="text-sm text-slate-500 mb-4">Connecting to TIA Data Cloud...</p>
            <input type="password" id="lecture-code" placeholder="Enter Lecturer Access Key" class="w-full border-2 p-3 rounded-lg mb-4 outline-none focus:border-blue-500">
            <button onclick="verifyLecturer()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Verify Identity</button>
            <p id="error-msg" class="text-red-500 text-xs mt-2 hidden">Invalid Credentials. Access Denied.</p>
        </div>
    </div>

    <div id="main-content" class="hidden flex h-screen">
        <div class="w-64 bg-slate-950 p-6 border-r border-slate-800">
            <h1 class="text-blue-400 font-bold text-xl mb-10">TIA LECTURER</h1>
            <nav class="space-y-4">
                <a href="dashboard.html" class="block text-slate-400 hover:text-white">📊 Student View</a>
                <a href="#" class="block text-white font-bold">🛰️ Broadcast Center</a>
            </nav>
        </div>
        <div class="flex-1 p-10 bg-slate-100 text-slate-800 overflow-y-auto">
            <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6">Broadcast New Assignment</h2>
                <input type="text" id="assign-title" placeholder="Assignment Title (e.g. Nursing Ethics)" class="w-full border p-3 rounded mb-4">
                <textarea id="assign-desc" placeholder="Instructions..." class="w-full border p-3 rounded h-32 mb-4"></textarea>
                <button onclick="broadcast()" class="bg-blue-600 text-white px-10 py-3 rounded-full font-bold shadow-lg hover:bg-blue-700">Broadcast to Students</button>
            </div>
        </div>
    </div>

    <script>
        function verifyLecturer() {
            const code = document.getElementById('lecture-code').value;
            // Simulated Security Check
            if(code === "TIA-LECT-2026") { 
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function broadcast() {
            const title = document.getElementById('assign-title').value;
            localStorage.setItem('latestAssignment', title); // This "Sends" it to the dashboard
            alert("Broadcast Successful! Students will see this on their dashboard.");
        }
    </script>
</body>
</html>
