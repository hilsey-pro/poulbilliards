<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">
    <header class="bg-slate-800 p-6 shadow-lg flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Hilsey Biz Staff Portal</h1>
        <button onclick="logout()" class="text-slate-400 uppercase text-xs font-bold hover:text-white transition">Sign Out</button>
    </header>

    <main class="max-w-4xl mx-auto p-12 text-center">
        <h2 class="text-4xl font-black uppercase mb-8">Welcome, Faculty Member</h2>
        <div class="bg-slate-800 p-12 rounded-[40px] shadow-2xl border-b-8 border-blue-600">
            <p class="text-slate-400 text-lg">Staff management features coming soon.</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('role');
            if (role !== 'staff') {
                window.location.href = 'index.html';
                return;
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
