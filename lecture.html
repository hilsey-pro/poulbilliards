<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Lecturer Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f172a; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 220px; background: #0b132b; color: white; display: flex; flex-direction: column; border-right: 1px solid #334155; flex-shrink: 0; }
        .nav-item { padding: 15px 20px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 14px; border-left: 4px solid transparent; }
        .active-link { background: rgba(58, 134, 255, 0.1); color: white; border-left-color: #3a86ff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 25px; font-weight: bold; color: #3a86ff; text-align: center;">HILSEY PRO</div>
        <a href="dashboard.html" class="nav-item"><span>📊 Dashboard</span></a>
        <a href="workspace.html" class="nav-item"><span>✍️ Workspace</span></a>
        <a href="hub.html" class="nav-item"><span>💬 Discussion Hub</span></a>
        <a href="lecture.html" class="nav-item active-link"><span>👨‍🏫 Lecturer Hub</span></a>
    </div>
    <div class="flex-1 p-10 bg-slate-50 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-3xl font-bold text-slate-800 mb-6">Lecturer Control Panel</h2>
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold mb-4">Post New TIA Assignment</h3>
                <input type="text" placeholder="Topic Name" class="w-full border p-3 mb-4 rounded-lg bg-slate-50">
                <textarea rows="6" placeholder="Instructions for students..." class="w-full border p-3 mb-4 rounded-lg bg-slate-50"></textarea>
                <div class="flex justify-between items-center">
                    <span class="text-sm text-slate-500 italic">This will appear on all student dashboards.</span>
                    <button onclick="alert('Assignment Broadcasted!')" class="bg-green-600 text-white px-8 py-3 rounded-lg font-bold shadow-md hover:bg-green-700">Broadcast</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
