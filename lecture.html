<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Hilsey Pro | Secure Lecturer Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div id="lock-screen" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl text-slate-800 w-full max-w-md shadow-2xl text-center">
            <h1 class="text-2xl font-black text-blue-600 mb-2 italic">HILSEY PRO</h1>
            <p class="text-sm text-slate-500 mb-6">Lecturer & Developer Access Only</p>
            <input type="password" id="access-key" placeholder="Enter Master Key" class="w-full border-2 p-4 rounded-xl mb-4 text-center text-lg">
            <button onclick="unlock()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">Verify & Enter</button>
            <p id="err" class="text-red-500 mt-4 hidden text-sm font-bold">⚠️ Access Denied: Unauthorized Personnel</p>
        </div>
    </div>

    <div id="main-ui" class="hidden flex h-screen">
        <div class="w-64 bg-slate-950 p-6 border-r border-slate-800">
            <h2 class="text-blue-400 font-bold mb-8">ADMIN PANEL</h2>
            <button onclick="broadcast()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">📢 Broadcast News</button>
            <a href="dashboard.html" class="block mt-10 text-slate-500 hover:text-white">← Return to Student View</a>
        </div>
        <div class="flex-1 p-10 bg-slate-100 text-slate-900 overflow-y-auto">
            <h1 class="text-3xl font-bold mb-6">Broadcast Center</h1>
            <input type="text" id="title" placeholder="Assignment Title" class="w-full p-4 rounded-lg border mb-4">
            <textarea id="msg" placeholder="Instructions for students..." class="w-full p-4 rounded-lg border h-64 mb-4"></textarea>
        </div>
    </div>

    <script>
        function unlock() {
            const key = document.getElementById('access-key').value;
            // MASTER KEY FOR YOU:
            if(key === "DEVELOPER-2026") {
                document.getElementById('lock-screen').remove();
                document.getElementById('main-ui').classList.remove('hidden');
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }
        function broadcast() {
            localStorage.setItem('latestAssignment', document.getElementById('title').value);
            alert("Sent to Student Dashboards!");
        }
    </script>
</body>
</html>
