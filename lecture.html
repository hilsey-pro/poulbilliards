<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Lecture Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen font-sans">
    
    <div class="w-72 bg-slate-900 text-white p-8 flex flex-col shrink-0">
        <h1 class="text-2xl font-black text-blue-500 italic mb-12 uppercase tracking-tighter text-center">HILSEY BIZ</h1>
        <nav class="space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 p-3 text-slate-400 font-bold text-sm"><span>📊</span> Dashboard</a>
            <a href="lecture.html" class="flex items-center gap-3 p-3 bg-blue-600 text-white rounded-xl font-bold text-sm"><span>📺</span> Lecture Panel</a>
            <a href="workspace.html" class="flex items-center gap-3 p-3 text-slate-400 font-bold text-sm"><span>✍️</span> Working Space</a>
        </nav>
    </div>

    <div class="flex-1 p-12 overflow-y-auto">
        <h2 class="text-3xl font-black italic uppercase mb-8">Lecture Admin Control</h2>
        
        <div class="bg-white p-10 rounded-[40px] shadow-sm border border-slate-200">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 block">Post New Assignment / Message to Dashboard</label>
            <textarea id="assign-input" placeholder="Type instructions or credentials here..." class="w-full h-40 bg-slate-50 p-6 rounded-3xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 mb-6"></textarea>
            
            <button onclick="postAssignment()" class="bg-slate-900 text-white px-10 py-5 rounded-3xl font-black uppercase tracking-widest hover:bg-blue-600 transition">Broadcast to Students</button>
        </div>

        <div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-blue-50 p-8 rounded-[30px] border border-blue-100">
                <h4 class="font-black uppercase text-blue-600 text-xs mb-2">TIA Cloud Credentials</h4>
                <p class="text-xs text-slate-500 font-bold">Connected: TIA/BACC/2026/SECURE_LINK</p>
            </div>
        </div>
    </div>

    <script>
        function postAssignment() {
            const msg = document.getElementById('assign-input').value;
            if(msg) {
                localStorage.setItem('latestAssignment', msg);
                alert("Message posted to Dashboard!");
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
