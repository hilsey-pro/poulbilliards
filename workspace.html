<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Hilsey Pro | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>
<body class="bg-slate-200">
    <div class="flex flex-col h-screen">
        <div class="bg-white border-b shadow-sm">
            <div id="toolbar-container"></div>
        </div>
        
        <div class="flex-1 overflow-y-auto p-10">
            <div id="editor" class="bg-white max-w-4xl mx-auto min-h-[1056px] shadow-2xl p-12 outline-none">
                <h1 class="text-center text-2xl font-serif">STUDENT REPORT</h1>
                <p>Start typing your TIA research here...</p>
            </div>
        </div>
    </div>

    <script>
        var quill = new Quill('#editor', {
            modules: {
                toolbar: [
                    [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'script': 'sub'}, { 'script': 'super' }],
                    [{ 'header': 1 }, { 'header': 2 }, 'blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            },
            theme: 'snow'
        });
    </script>
</body>
</html>
