<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tool-btn { background: #f1f5f9; padding: 10px 15px; border-radius: 10px; font-weight: 700; border: 1px solid #e2e8f0; }
        .tool-btn:hover { background: #3b82f6; color: white; }
        #editor { min-height: 600px; padding: 40px; background: white; border-radius: 0 0 30px 30px; border: 1px solid #e2e8f0; border-top: none; outline: none; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen font-sans">
    <div class="flex-1 p-10 flex flex-col">
        <header class="mb-6 flex justify-between items-center">
            <h2 class="text-3xl font-black italic uppercase">Academic Word Editor</h2>
            <button onclick="window.print()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase">Save/Print PDF</button>
        </header>
        <div class="bg-white p-4 border border-slate-200 rounded-t-[30px] flex gap-2">
            <button onclick="document.execCommand('bold')" class="tool-btn font-bold">B</button>
            <button onclick="document.execCommand('italic')" class="tool-btn italic">I</button>
            <button onclick="document.execCommand('justifyLeft')" class="tool-btn">L</button>
            <button onclick="document.execCommand('justifyCenter')" class="tool-btn">C</button>
            <button onclick="document.execCommand('insertUnorderedList')" class="tool-btn">List</button>
        </div>
        <div id="editor" contenteditable="true">Start your assignment...</div>
    </div>
</body>
</html>
