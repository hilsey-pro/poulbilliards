<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Working Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toolbar-btn { background: #f8fafc; padding: 10px 15px; border-radius: 10px; font-weight: 900; color: #1e293b; border: 1px solid #e2e8f0; }
        .toolbar-btn:hover { background: #3b82f6; color: white; }
        #editor { min-height: 500px; padding: 40px; background: white; border-radius: 0 0 30px 30px; outline: none; border: 1px solid #e2e8f0; border-top: none; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen font-sans">

    <div class="w-72 bg-slate-900 text-white p-8 flex flex-col shrink-0">
        <h1 class="text-2xl font-black text-blue-500 italic mb-12 uppercase text-center">HILSEY BIZ</h1>
        <nav class="space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 p-3 text-slate-400 font-bold text-sm"><span>📊</span> Dashboard</a>
            <a href="workspace.html" class="flex items-center gap-3 p-3 bg-blue-600 text-white rounded-xl font-bold text-sm"><span>✍️</span> Working Space</a>
        </nav>
    </div>

    <div class="flex-1 p-10 flex flex-col">
        <header class="mb-6 flex justify-between items-center">
            <h2 class="text-3xl font-black italic uppercase">Academic Word Editor</h2>
            <button onclick="saveWork()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase">Save to Cloud</button>
        </header>

        <div class="bg-white p-4 border border-slate-200 rounded-t-[30px] flex gap-2">
            <button onclick="exec('bold')" class="toolbar-btn text-xs">B</button>
            <button onclick="exec('italic')" class="toolbar-btn italic text-xs">I</button>
            <button onclick="exec('underline')" class="toolbar-btn underline text-xs">U</button>
            <div class="w-px h-8 bg-slate-200 mx-2"></div>
            <button onclick="exec('justifyLeft')" class="toolbar-btn text-xs">Align L</button>
            <button onclick="exec('justifyCenter')" class="toolbar-btn text-xs">Align C</button>
            <button onclick="exec('insertUnorderedList')" class="toolbar-btn text-xs">Bullets</button>
        </div>

        <div id="editor" contenteditable="true">
            <p>Start writing your assignment here...</p>
        </div>
    </div>

    <script>
        function exec(command) { document.execCommand(command, false, null); }
        
        function saveWork() {
            const content = document.getElementById('editor').innerHTML;
            localStorage.setItem('savedAssignmentContent', content);
            alert("Work saved to your Hilsey Biz account!");
        }

        window.onload = function() {
            const saved = localStorage.getItem('savedAssignmentContent');
            if(saved) document.getElementById('editor').innerHTML = saved;
        }
    </script>
</body>
</html>
