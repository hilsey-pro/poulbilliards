<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Hilsey Pro | Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex">
    <div class="w-64 bg-slate-900 h-screen text-white p-6">
        <h1 class="text-xl font-bold mb-10 italic">HILSEY LIBRARY</h1>
        <nav class="space-y-4">
            <a href="dashboard.html" class="block text-slate-400">Dashboard</a>
            <a href="workspace.html" class="block text-slate-400">New Blank Document</a>
        </nav>
    </div>
    <div class="flex-1 p-10 overflow-y-auto">
        <h2 class="text-3xl font-bold mb-8 italic text-slate-800">Professional TIA Templates</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-md border-2 border-transparent hover:border-blue-500 cursor-pointer transition" 
                 onclick="useTemplate('cv')">
                <h3 class="text-xl font-bold">Nursing CV (Manchester Style)</h3>
                <p class="text-slate-500 text-sm">A modern, international layout used by recruiters.</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border-2 border-transparent hover:border-blue-500 cursor-pointer transition" 
                 onclick="useTemplate('letter')">
                <h3 class="text-xl font-bold">Professional Cover Letter</h3>
                <p class="text-slate-500 text-sm">Example: Daniel Carter's Marketing Letter.</p>
            </div>
        </div>
    </div>

    <script>
        function useTemplate(type) {
            // This stores the template name so the Workspace knows what to load
            localStorage.setItem('activeTemplate', type);
            window.location.href = 'workspace.html';
        }
    </script>
</body>
</html>
