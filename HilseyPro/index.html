<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Pro | Student OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
        .animate-ui { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <section id="login-screen" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black mb-10 bg-gradient-to-b from-white to-slate-500 bg-clip-text text-transparent">HILSEY.</h1>
        <input id="pin-input" type="password" maxlength="4" placeholder="PIN" class="bg-slate-900 border border-slate-800 p-4 rounded-xl text-center text-2xl outline-none mb-4 w-48">
        <button onclick="app.login()" class="bg-blue-600 px-10 py-4 rounded-xl font-bold">ACCESS</button>
    </section>

    <section id="dashboard" class="hidden">
        <nav class="p-6 border-b border-slate-900 flex justify-between items-center glass sticky top-0 z-50">
            <span class="font-bold text-blue-400">HILSEY PRO v2.6</span>
            <button onclick="location.reload()" class="text-xs text-slate-500">EXIT</button>
        </nav>

        <main class="p-6 max-w-6xl mx-auto">
            <div id="display-area" class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-ui">
                </div>
        </main>
    </section>

    <script src="main.js"></script>
</body>
</html>
