<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Pro | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen font-sans">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-blue-600 italic mb-2">HILSEY PRO</h1>
        <p class="text-center text-slate-500 mb-8 font-semibold">TIA STUDENT PORTAL</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Student ID</label>
                <input type="text" placeholder="e.g. TIA-2026-001" class="w-full border-2 border-slate-200 p-3 rounded-lg outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Access Code</label>
                <input type="password" placeholder="••••••••" class="w-full border-2 border-slate-200 p-3 rounded-lg outline-none focus:border-blue-500">
            </div>
            <button onclick="window.location.href='dashboard.html'" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-all shadow-lg">
                Enter Portal
            </button>
        </div>
        
        <p class="text-center text-xs text-slate-400 mt-6 uppercase tracking-widest">Secured Academic Environment</p>
    </div>
</body>
</html>
