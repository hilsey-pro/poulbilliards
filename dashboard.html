<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Hub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">
    <header class="bg-slate-800 p-6 shadow-lg flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Hilsey Biz Dashboard</h1>
        <div id="userInfo" class="text-sm font-bold uppercase"></div>
    </header>

    <main class="max-w-4xl mx-auto p-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-slate-800 p-8 rounded-[40px] shadow-2xl text-center border-b-8 border-blue-600 hover:scale-105 transition">
                <h2 class="text-xl font-black uppercase mb-4">Academic Workspace</h2>
                <p class="text-slate-400 text-xs mb-6">Work on your assignments and projects.</p>
                <button onclick="window.location.href='workspace.html'" class="bg-blue-600 px-6 py-2 rounded-full font-bold uppercase text-xs">Enter</button>
            </div>

            <div class="bg-slate-800 p-8 rounded-[40px] shadow-2xl text-center border-b-8 border-green-600 hover:scale-105 transition">
                <h2 class="text-xl font-black uppercase mb-4">Marketplace</h2>
                <p class="text-slate-400 text-xs mb-6">Buy academic tools and materials.</p>
                <button onclick="window.location.href='marketplace.html'" class="bg-green-600 px-6 py-2 rounded-full font-bold uppercase text-xs">Shop</button>
            </div>

            <div class="bg-slate-800 p-8 rounded-[40px] shadow-2xl text-center border-b-8 border-purple-600 hover:scale-105 transition">
                <h2 class="text-xl font-black uppercase mb-4">Past Papers</h2>
                <p class="text-slate-400 text-xs mb-6">Access archived exams and papers.</p>
                <button onclick="window.location.href='past-papers.html'" class="bg-purple-600 px-6 py-2 rounded-full font-bold uppercase text-xs">Browse</button>
            </div>
        </div>

        <div class="mt-12 text-center">
            <button onclick="logout()" class="text-slate-400 uppercase text-xs font-bold hover:text-white transition">Sign Out</button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userReg = localStorage.getItem('userReg');
            const role = localStorage.getItem('role');
            if (!role) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('userInfo').innerText = `User: ${userReg || 'Staff'}`;
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
