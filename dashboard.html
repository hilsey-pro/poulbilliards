<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 13px; }
        .nav-item:hover { background: #1e293b; color: white; }
        .active-nav { background: #3b82f6; color: white; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen font-sans">
    <div class="w-72 bg-slate-900 text-white p-8 flex flex-col shrink-0">
        <h1 class="text-2xl font-black text-blue-500 italic mb-12 uppercase tracking-tighter">HILSEY BIZ</h1>
        <nav class="space-y-1 flex-1">
            <a href="dashboard.html" class="nav-item active-nav"><span>📊</span> Dashboard</a>
            <a href="shop.html" class="nav-item"><span>🛍️</span> Marketplace</a>
            <a href="workspace.html" class="nav-item"><span>✍️</span> Working Space</a>
            <a href="papers.html" class="nav-item"><span>📝</span> Past Papers</a>
            <a href="discussion.html" class="nav-item"><span>💬</span> Discussion Hub</a>
            <a href="gateway.html" class="nav-item mt-12 text-red-400"><span>🚪</span> Secure Logout</a>
        </nav>
    </div>
    <div class="flex-1 p-12 overflow-y-auto">
        <header class="mb-10 flex justify-between">
            <h2 class="text-4xl font-black italic uppercase">Habari, <span id="welcome-reg">STUDENT</span></h2>
            <div class="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm text-center">
                <p class="text-[10px] font-black text-blue-600">WALLET</p>
                <p id="dash-bal" class="text-lg font-black text-green-500">0 Tsh</p>
            </div>
        </header>
    </div>
    <script>
        // Check Security on Load
        const reg = localStorage.getItem('userReg');
        if(!reg) window.location.href = "gateway.html";
        document.getElementById('welcome-reg').innerText = reg;

        // Load Balance
        const bal = parseInt(localStorage.getItem('userBalance')) || 0;
        document.getElementById('dash-bal').innerText = bal.toLocaleString() + " Tsh";
    </script>
</body>
</html>
