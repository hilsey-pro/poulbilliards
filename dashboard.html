<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Biz | Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .biz-card { transition: 0.3s; border: 1px solid #e2e8f0; background: white; border-radius: 30px; padding: 30px; }
        .biz-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 13px; }
        .nav-item:hover { background: #1e293b; color: white; }
        .active-nav { background: #3b82f6; color: white; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans text-slate-900">

    <div class="w-72 bg-slate-900 text-white p-8 flex flex-col shrink-0">
        <div class="mb-12">
            <h1 class="text-2xl font-black text-blue-500 italic tracking-tighter uppercase">HILSEY BIZ</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Enterprise Edition</p>
        </div>
        
        <nav class="space-y-2 flex-1">
            <a href="dashboard.html" class="nav-item active-nav"><span>📊</span> Dashboard</a>
            <a href="shop.html" class="nav-item"><span>🛍️</span> Marketplace</a>
            <a href="papers.html" class="nav-item"><span>📝</span> Past Papers</a>
            <a href="classes.html" class="nav-item"><span>🏫</span> Class Manager</a>
            <a href="discussion.html" class="nav-item"><span>💬</span> Discussion Hub</a>
            <a href="gateway.html" class="nav-item text-red-400 mt-10"><span>🚪</span> Logout</a>
        </nav>

        <div class="mt-auto p-4 bg-slate-800 rounded-2xl border border-slate-700">
            <p class="text-[10px] text-slate-500 font-bold uppercase">Main Balance</p>
            <p id="dash-balance" class="text-xl font-black text-green-400">0 Tsh</p>
        </div>
    </div>

    <div class="flex-1 p-12 overflow-y-auto">
        <header class="flex justify-between items-start mb-12">
            <div>
                <h2 class="text-4xl font-black tracking-tight italic uppercase">Habari, <span id="user-name" class="text-blue-600">Director</span>!</h2>
                <p class="text-slate-500 font-medium mt-1">Your academic business empire is live.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="biz-card">
                <div class="bg-blue-50 w-12 h-12 rounded-xl flex items-center justify-center mb-6">📈</div>
                <h3 class="text-slate-400 text-xs font-bold uppercase mb-1">Sales Review</h3>
                <p class="text-3xl font-black">0 <span class="text-sm">Tsh</span></p>
            </div>
            <div class="biz-card">
                <div class="bg-purple-50 w-12 h-12 rounded-xl flex items-center justify-center mb-6">📦</div>
                <h3 class="text-slate-400 text-xs font-bold uppercase mb-1">Active Orders</h3>
                <p class="text-3xl font-black">0 <span class="text-sm">Items</span></p>
            </div>
            <div class="biz-card bg-slate-900 border-none">
                <div class="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center mb-6 text-white text-xl">🤖</div>
                <h3 class="text-slate-500 text-xs font-bold uppercase mb-1">Hilsey AI Pro</h3>
                <p class="text-3xl font-black text-white">Locked</p>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const name = localStorage.getItem('empireOwner') || "Director";
            document.getElementById('user-name').innerText = name;
            
            const balance = parseInt(localStorage.getItem('userBalance')) || 0;
            document.getElementById('dash-balance').innerText = balance.toLocaleString() + " Tsh";
        }
    </script>
</body>
</html>
