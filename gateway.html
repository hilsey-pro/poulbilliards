<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hilsey Biz | Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen font-sans p-6">

    <div class="bg-white w-full max-w-md rounded-[40px] p-12 shadow-2xl text-center border-b-8 border-blue-600">
        <h1 class="text-3xl font-black italic text-slate-900 mb-2 uppercase tracking-tighter">Hilsey Biz</h1>
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-10">Student & Faculty Portal</p>

        <div class="space-y-6 text-left">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-4 text-slate-400">Username / Email</label>
                <input type="text" id="user-input" placeholder="e.g. student@tia.ac.tz" class="w-full bg-slate-100 p-5 rounded-3xl outline-none focus:ring-2 focus:ring-blue-600 font-bold text-sm">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-4 text-slate-400">Security Password</label>
                <input type="password" id="pass-input" placeholder="••••••••" class="w-full bg-slate-100 p-5 rounded-3xl outline-none focus:ring-2 focus:ring-blue-600 font-bold text-sm">
            </div>
        </div>

        <button onclick="login()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black mt-10 hover:bg-blue-600 transition shadow-xl tracking-widest uppercase text-sm">Verify & Enter</button>
        
        <p id="error" class="text-red-500 text-[10px] font-bold mt-4 uppercase hidden italic">Access Denied: Invalid Credentials</p>
    </div>

    <script>
        function login() {
            const user = document.getElementById('user-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();

            if (user === "" || pass === "") {
                alert("Please fill in all fields");
                return;
            }

            // LECTURE/ADMIN SECURITY (Developer Passwords)
            if (pass === "developer2021" || pass === "developer2022") {
                localStorage.setItem('userRole', 'staff');
                localStorage.setItem('userEmail', user);
                window.location.href = "lecture.html";
            } 
            // STUDENT ACCESS
            else if (user === pass) {
                localStorage.setItem('userRole', 'student');
                localStorage.setItem('userEmail', user);
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
