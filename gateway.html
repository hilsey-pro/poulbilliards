<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilsey Biz | Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen font-sans p-6">

    <div class="bg-white w-full max-w-md rounded-[40px] p-12 shadow-2xl text-center border-b-8 border-blue-600">
        <h1 class="text-3xl font-black italic text-slate-900 mb-2 uppercase tracking-tighter">Hilsey Biz</h1>
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-10">Securing William Edward's Empire</p>

        <div class="space-y-6 text-left">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Registration ID</label>
                <input type="text" id="reg-id" placeholder="ENTER ID" class="w-full bg-slate-100 p-5 rounded-3xl outline-none focus:ring-2 focus:ring-blue-600 font-bold uppercase text-sm">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-4">Security Password</label>
                <input type="password" id="pass-id" placeholder="MUST MATCH ID" class="w-full bg-slate-100 p-5 rounded-3xl outline-none focus:ring-2 focus:ring-blue-500 font-bold uppercase text-sm">
            </div>
        </div>

        <button onclick="launchEmpire()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black mt-10 hover:bg-blue-600 transition shadow-xl tracking-widest uppercase text-sm">Launch Dashboard</button>
        
        <p id="auth-error" class="text-red-500 text-[10px] font-bold mt-4 uppercase hidden italic">Critical Error: Credentials do not match!</p>
    </div>

    <script>
        function launchEmpire() {
            const idValue = document.getElementById('reg-id').value.trim();
            const passValue = document.getElementById('pass-id').value.trim();

            if (idValue !== "" && idValue === passValue) {
                // Save session data
                localStorage.setItem('empireOwner', "William Edward");
                localStorage.setItem('empireID', idValue);
                // Redirect to main dashboard
                window.location.href = "dashboard.html";
            } else {
                const errorLine = document.getElementById('auth-error');
                errorLine.classList.remove('hidden');
                setTimeout(() => errorLine.classList.add('hidden'), 3000);
            }
        }
    </script>
</body>
</html>
